let li=0, filter='all', list=[], cur=0, koShown=false;

const CONJ={talk:['talking','talked','talks','talk'],hang:['hanging','hung','hangs','hang'],
  turn:['turning','turned','turns','turn'],show:['showing','showed','shown','shows','show'],
  run:['running','ran','runs','run'],live:['living','lived','lives','live']};
function headRe(v){return new RegExp('\\b('+CONJ[v].join('|')+')\\b','i');}
function boldPhrasal(s,it){
  const tail=it.tag.split(' ').slice(1);
  let out=s.replace(headRe(it.v),'<b>$1</b>');
  tail.forEach(p=>{out=out.replace(new RegExp('(?<!<b>)\\b('+p+')\\b','i'),'<b>$1</b>');});
  return out;
}
function boldGoingto(s){
  let out=s.replace(/\b(gonna|going to)\b/i,'<b>$1</b>');
  out=out.replace(/([A-Za-z]+'ll)/,'<b>$1</b>');
  out=out.replace(/(?<!<b>)\b(won't|will)\b/i,'<b>$1</b>');
  return out;
}
function boldCond(s){var out=s.replace(/\b(as long as|as though|as if|provided that|provided|in case|even if|only if|if only|unless|if|wish)\b/i,'<b>$1</b>');out=out.replace(/(?<!<b>)\b(would have|could have|might have|would|could|might)\b/i,'<b>$1</b>');return out;}
function bold(s,it){const b=LESSONS[li].bold;if(b==='phrasal')return boldPhrasal(s,it);if(b==='goingto')return boldGoingto(s);if(b==='supposed')return s.replace(/\b(supposed to)\b/i,'<b>$1</b>');if(b==='cond')return boldCond(s);return s;}
function data(){return LESSONS[li].data;}
function ansOf(d){return LESSONS[li].choiceBy==='en'?d.en:d.tag;}

function pickVoice(){const vs=speechSynthesis.getVoices();
  return vs.find(v=>/en[-_]US/i.test(v.lang)&&/female|Samantha|Zira|Google US/i.test(v.name))
    ||vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;}
function speak(t,onend){if(!('speechSynthesis' in window)){alert('이 브라우저는 음성 재생을 지원하지 않아요');return;}
  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';
  u.rate=parseFloat(document.getElementById('rate').value);const v=pickVoice();if(v)u.voice=v;
  if(onend)u.onend=onend;
  speechSynthesis.speak(u);}

function buildLessons(){const box=document.getElementById('lessons');box.innerHTML='';
  const lbl=document.createElement('label');lbl.textContent='레슨 선택';lbl.htmlFor='lessonSelect';box.appendChild(lbl);
  const sel=document.createElement('select');sel.id='lessonSelect';
  LESSONS.forEach((L,i)=>{const o=document.createElement('option');o.value=i;o.textContent=L.name;if(i===li)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>{li=+sel.value;filter='all';rebuild();};box.appendChild(sel);}
function buildFilters(){const box=document.getElementById('filters');box.innerHTML='';
  const gs=['all',...LESSONS[li].groups];
  gs.forEach(g=>{const b=document.createElement('button');b.className='chip'+(g===filter?' active':'');
    b.textContent=g==='all'?'전체':g;b.onclick=()=>{filter=g;applyFilter();};box.appendChild(b);});}
function applyFilter(){list=filter==='all'?data().slice():data().filter(d=>d.g===filter);cur=0;buildFilters();render();newQuiz();if(autoPlay)restartAuto();}
function rebuild(){buildLessons();applyFilter();}

function render(){const d=list[cur];if(!d)return;
  document.getElementById('pvtag').textContent=d.tag;
  document.getElementById('idx').textContent=(cur+1)+' / '+list.length;
  document.getElementById('en').innerHTML=bold(d.en,d);
  document.getElementById('ko').textContent=d.ko;
  document.getElementById('bar').style.width=((cur+1)/list.length*100)+'%';}
function toggleKo(){koShown=!koShown;document.getElementById('ko').classList.toggle('hidden',!koShown);}
function revealKo(){koShown=true;document.getElementById('ko').classList.remove('hidden');}
function next(){cur=(cur+1)%list.length;koShown=false;document.getElementById('ko').classList.add('hidden');render();if(autoPlay)restartAuto();else speakCurrent();}
function prev(){cur=(cur-1+list.length)%list.length;koShown=false;document.getElementById('ko').classList.add('hidden');render();if(autoPlay)restartAuto();}
function shuffle(){for(let i=list.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[list[i],list[j]]=[list[j],list[i]];}cur=0;render();if(autoPlay)restartAuto();}
function speakCurrent(){speak(list[cur].en);}

// 자동 재생: 현재 문장을 REPEAT번 읽고 다음 문장으로 자동 이동
const REPEAT=3;let autoPlay=false,autoToken=0;
function toggleAuto(){setAuto(!autoPlay);}
function setAuto(on){autoPlay=on;autoToken++;speechSynthesis.cancel();
  const b=document.getElementById('autoBtn');b.classList.toggle('active',on);
  b.textContent=on?'⏸ 자동재생 중':'▶ 자동재생';
  if(on)autoRun(autoToken);}
function restartAuto(){autoToken++;speechSynthesis.cancel();autoRun(autoToken);}
function autoRun(token){if(!autoPlay||token!==autoToken||!list.length)return;
  render();
  speakTimes(list[cur].en,REPEAT,token,()=>{
    if(!autoPlay||token!==autoToken)return;
    cur=(cur+1)%list.length;koShown=false;document.getElementById('ko').classList.add('hidden');
    setTimeout(()=>autoRun(token),700);});}
function speakTimes(text,times,token,done){if(!autoPlay||token!==autoToken)return;
  speak(text,()=>{if(!autoPlay||token!==autoToken)return;
    if(times>1)setTimeout(()=>speakTimes(text,times-1,token,done),450);
    else done();});}
function rateLbl(){document.getElementById('rateLbl').textContent=document.getElementById('rate').value+'x';}

let qmode='dict',q=null,right=0,total=0,answered=false;
function setQmode(m){qmode=m;
  document.getElementById('qmDict').classList.toggle('active',m==='dict');
  document.getElementById('qmChoice').classList.toggle('active',m==='choice');
  document.getElementById('dictBox').style.display=m==='dict'?'block':'none';
  document.getElementById('choiceBox').style.display=m==='choice'?'block':'none';
  newQuiz();}
function newQuiz(){answered=false;if(!list.length)return;
  q=list[Math.random()*list.length|0];
  document.getElementById('qpvtag').textContent=qmode==='choice'?'?':q.tag;
  document.getElementById('qko').textContent=q.ko;
  document.getElementById('qinput').value='';
  document.getElementById('dictFb').innerHTML='';
  document.getElementById('qcko').textContent=q.ko;
  const cb=LESSONS[li].choiceBy;
  document.getElementById('choicePrompt').textContent=cb==='en'?'위 뜻에 맞는 속담(영어)을 고르세요':(LESSONS[li].bold==='phrasal'?'위 뜻에 알맞은 구동사를 고르세요':'위 문장에 어울리는 유형/뉘앙스를 고르세요');
  buildChoices();
  document.getElementById('choiceFb').innerHTML='';}
function speakQuiz(){speak(q.en);}
function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();}
function checkDict(){if(answered){nextQuiz();return;}
  const ans=norm(document.getElementById('qinput').value),target=norm(q.en);
  const fb=document.getElementById('dictFb');total++;answered=true;
  if(ans===target){right++;fb.innerHTML='<span class="ok">✅ 정확해요!</span>';}
  else{const tw=target.split(' '),aw=ans.split(' ');
    const h=tw.map((w,i)=>aw[i]===w?w:'<span class="miss">'+w+'</span>').join(' ');
    fb.innerHTML='<span class="no">❌ 다시 확인</span><br>정답: <span class="diff">'+h+'</span><br><span style="color:var(--muted)">'+q.en+'</span>';}
  updateScore();}
function hintDict(){const w=q.en.split(' ');
  document.getElementById('dictFb').innerHTML='<span style="color:var(--muted)">힌트: '+w.map(x=>x[0]+'___').join(' ')+' ('+w.length+'단어)</span>';}
function buildChoices(){const box=document.getElementById('choices');box.innerHTML='';
  const correct=ansOf(q);
  const pool=[...new Set(data().map(ansOf).filter(p=>p!==correct))];
  for(let i=pool.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pool[i],pool[j]]=[pool[j],pool[i]];}
  let opts=[correct,...pool.slice(0,3)];
  for(let i=opts.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[opts[i],opts[j]]=[opts[j],opts[i]];}
  opts.forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>pickChoice(b,o,correct);box.appendChild(b);});}
function pickChoice(btn,chosen,correct){if(answered)return;answered=true;total++;
  document.querySelectorAll('#choices .choice').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
  const detail=bold(q.en,q)+'<br><span style="color:var(--muted)">'+q.ko+'</span>';
  if(chosen===correct){right++;document.getElementById('choiceFb').innerHTML='<span class="ok">✅ 정답!</span><br>'+detail;}
  else{btn.classList.add('wrong');document.getElementById('choiceFb').innerHTML='<span class="no">❌ 오답</span><br>'+detail;}
  speak(q.en);updateScore();}
function nextQuiz(){newQuiz();}
function updateScore(){document.getElementById('score').textContent='점수: '+right+' / '+total+' ('+(total?Math.round(right/total*100):0)+'%)';}

function setTab(t){if(t!=='study'&&autoPlay)setAuto(false);
  document.getElementById('study').style.display=t==='study'?'block':'none';
  document.getElementById('quiz').style.display=t==='quiz'?'block':'none';
  document.getElementById('tabStudy').classList.toggle('active',t==='study');
  document.getElementById('tabQuiz').classList.toggle('active',t==='quiz');
  speechSynthesis.cancel();}

// keyboard shortcuts (dictation mode): 3=듣기, 1=확인, 2=다음
document.addEventListener('keydown',function(e){
  const quizVisible=document.getElementById('quiz').style.display!=='none';
  if(!quizVisible||qmode!=='dict')return;
  if(e.key==='3'){e.preventDefault();speakQuiz();}
  else if(e.key==='1'){e.preventDefault();checkDict();}
  else if(e.key==='2'){e.preventDefault();nextQuiz();}
});

buildLessons();applyFilter();rateLbl();
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();}
</script>
