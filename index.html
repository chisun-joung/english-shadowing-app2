<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 쉐도잉 연습 · 구동사 + be going to + 속담</title>
<style>
  :root{--bg:#0f1226;--card:#1a1f3d;--card2:#232a52;--accent:#7c8cff;--accent2:#4ad0c0;
    --text:#eef1ff;--muted:#9aa3d0;--good:#3ddc84;--bad:#ff6b7d;--shadow:0 10px 30px rgba(0,0,0,.35);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    background:radial-gradient(1200px 600px at 20% -10%,#26306a 0%,transparent 60%),var(--bg);
    color:var(--text);min-height:100vh;padding:18px;}
  .wrap{max-width:760px;margin:0 auto;}
  header{text-align:center;margin:8px 0 14px;position:relative;}
  .refresh{position:absolute;top:0;right:0;border:1px solid #2c3566;background:var(--card);color:var(--text);
    width:38px;height:38px;border-radius:12px;font-size:16px;cursor:pointer;transition:.15s;line-height:1}
  .refresh:hover{background:var(--card2)}
  .refresh:active{transform:rotate(180deg) scale(.92)}
  header h1{font-size:20px;letter-spacing:-.3px}
  header p{color:var(--muted);font-size:12px;margin-top:5px}
  .lessons{position:relative;margin-bottom:12px}
  .lessons label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:0 0 6px 4px;letter-spacing:.3px}
  .lessons select{width:100%;appearance:none;-webkit-appearance:none;
    border:1px solid #2c3566;background:linear-gradient(135deg,var(--accent),#5a6bd8);color:#fff;
    padding:13px 42px 13px 16px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;
    line-height:1.3;transition:.15s;box-shadow:var(--shadow)}
  .lessons select:focus{outline:none;border-color:var(--accent2)}
  .lessons select option{background:var(--card);color:var(--text);font-weight:600}
  .lessons::after{content:'▾';position:absolute;right:16px;bottom:13px;color:#fff;font-size:14px;pointer-events:none}
  .tabs{display:flex;gap:8px;background:var(--card);padding:6px;border-radius:14px;margin-bottom:14px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px;border-radius:10px;
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .tabs button.active{background:var(--accent);color:#fff}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
  .chip{background:var(--card);color:var(--text);border:1px solid #2c3566;border-radius:10px;
    padding:8px 12px;font-size:12px;cursor:pointer}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .chipwrap{display:flex;flex-wrap:wrap;gap:6px}
  .card{background:linear-gradient(160deg,var(--card),var(--card2));border-radius:20px;padding:26px 22px;
    box-shadow:var(--shadow);margin-bottom:14px}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;color:var(--muted)}
  .pvtag{background:rgba(124,140,255,.18);color:#c3ccff;padding:4px 10px;border-radius:20px;font-weight:700}
  .en{font-size:22px;line-height:1.5;font-weight:600;margin:6px 0 4px}
  .en b{color:var(--accent2)}
  .ko{font-size:15px;color:var(--muted);line-height:1.5;margin-top:10px;min-height:22px;transition:.2s}
  .ko.hidden{filter:blur(7px);opacity:.5}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;align-items:center}
  .btn{border:0;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
  .btn.play{background:var(--accent2);color:#04201c}
  .btn.ghost{background:var(--card2);color:var(--text);border:1px solid #333c6e}
  .btn.auto{background:var(--card2);color:var(--text);border:1px solid #333c6e}
  .btn.auto.active{background:linear-gradient(135deg,var(--accent),#5a6bd8);color:#fff;border-color:transparent}
  .btn:active{transform:scale(.96)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px}
  .nav .btn{flex:1}
  .speed{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  input[type=range]{accent-color:var(--accent2)}
  .progress{height:6px;background:var(--card);border-radius:6px;overflow:hidden;margin-bottom:14px}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s}
  .counter{text-align:center;color:var(--muted);font-size:13px;margin-top:4px}
  .qinput{width:100%;background:var(--card);border:1px solid #2c3566;border-radius:12px;color:var(--text);
    padding:14px;font-size:16px;margin-top:16px}
  .feedback{margin-top:14px;font-size:14px;line-height:1.6;min-height:20px}
  .feedback .ok{color:var(--good);font-weight:700}
  .feedback .no{color:var(--bad);font-weight:700}
  .diff .miss{background:rgba(255,107,125,.25);border-radius:4px;padding:0 2px}
  .choices{display:grid;gap:10px;margin-top:16px}
  .choice{text-align:left;background:var(--card);border:1px solid #2c3566;color:var(--text);
    padding:14px;border-radius:12px;cursor:pointer;font-size:15px;transition:.12s}
  .choice:hover{border-color:var(--accent)}
  .choice.correct{background:rgba(61,220,132,.18);border-color:var(--good)}
  .choice.wrong{background:rgba(255,107,125,.18);border-color:var(--bad)}
  .score{text-align:center;font-size:13px;color:var(--muted);margin-top:10px}
  .qmode{display:flex;gap:8px;margin-bottom:12px}
  .qmode button{flex:1}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6}
  footer{text-align:center;color:var(--muted);font-size:11px;margin:24px 0 8px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="refresh" onclick="location.reload()" title="새로고침">🔄</button>
    <h1>🎬 영어 쉐도잉 연습</h1>
    <p>미드 스타일 필수 표현 · 레슨을 골라 연습하세요</p>
  </header>

  <div class="lessons" id="lessons"></div>

  <div class="tabs">
    <button id="tabStudy" class="active" onclick="setTab('study')">📖 학습·쉐도잉</button>
    <button id="tabQuiz" onclick="setTab('quiz')">✍️ 퀴즈·받아쓰기</button>
  </div>

  <div class="controls"><div class="chipwrap" id="filters"></div></div>

  <section id="study">
    <div class="progress"><div id="bar"></div></div>
    <div class="card">
      <div class="meta"><span class="pvtag" id="pvtag"></span><span id="idx"></span></div>
      <div class="en" id="en"></div>
      <div class="ko hidden" id="ko" onclick="revealKo()"></div>
      <div class="row">
        <button class="btn play" onclick="speakCurrent()">🔊 듣기</button>
        <button class="btn ghost" onclick="toggleKo()">🇰🇷 뜻 보기</button>
        <button class="btn auto" id="autoBtn" onclick="toggleAuto()">▶ 자동재생</button>
        <div class="speed">속도 <input type="range" min="0.5" max="1.2" step="0.1" value="0.9" id="rate" oninput="rateLbl()"><span id="rateLbl">0.9x</span></div>
      </div>
      <div class="nav">
        <button class="btn ghost" onclick="prev()">◀ 이전</button>
        <button class="btn ghost" onclick="shuffle()">🔀 섞기</button>
        <button class="btn ghost" onclick="next()">다음 ▶</button>
      </div>
    </div>
    <div class="counter">문장을 클릭하면 뜻이 나와요 · 🔊로 여러 번 따라 말해보세요</div>
  </section>

  <section id="quiz" style="display:none">
    <div class="qmode">
      <button class="btn ghost active" id="qmDict" onclick="setQmode('dict')">받아쓰기</button>
      <button class="btn ghost" id="qmChoice" onclick="setQmode('choice')">뜻 맞히기</button>
    </div>
    <div class="card">
      <div class="meta"><span class="pvtag" id="qpvtag">?</span><span id="qidx"></span></div>
      <div id="dictBox">
        <div class="ko" id="qko" style="font-size:17px;color:var(--text)"></div>
        <button class="btn play" style="margin-top:14px" onclick="speakQuiz()">🔊 듣고 받아쓰기</button>
        <input class="qinput" id="qinput" placeholder="들은 문장을 영어로 입력하세요" autocomplete="off" onkeydown="if(event.key==='Enter')checkDict()">
        <div class="row">
          <button class="btn play" onclick="checkDict()">확인</button>
          <button class="btn ghost" onclick="hintDict()">힌트</button>
          <button class="btn ghost" onclick="nextQuiz()">다음 ▶</button>
        </div>
        <div class="feedback" id="dictFb"></div>
        <div class="hint">⌨️ 단축키 — <b>3</b>: 듣기 · <b>1</b>: 확인 · <b>2</b>: 다음 문장 · <b>Enter</b>: 확인</div>
      </div>
      <div id="choiceBox" style="display:none">
        <div class="ko" id="qcko" style="font-size:17px;color:var(--text)"></div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px" id="choicePrompt"></div>
        <div class="choices" id="choices"></div>
        <div class="row"><button class="btn ghost" onclick="nextQuiz()">다음 ▶</button></div>
        <div class="feedback" id="choiceFb"></div>
      </div>
    </div>
    <div class="score" id="score">점수: 0 / 0</div>
  </section>

  <footer>
    예문·속담은 각 주제를 학습하기 위해 정리한 것으로, 널리 알려진 표현과 새로 작성한 오리지널 문장입니다.<br>
    음성은 브라우저 내장 TTS(Web Speech API) · Chrome·Edge 권장.
  </footer>
</div>

<!-- 레슨 데이터 (레슨별 개별 파일) -->
<script src="lessons/01-phrasal.js"></script>
<script src="lessons/02-goingto.js"></script>
<script src="lessons/03-proverb.js"></script>
<script src="lessons/04-business.js"></script>
<script src="lessons/05-travel.js"></script>
<script src="lessons/06-supposed.js"></script>
<script src="lessons/07-self.js"></script>
<script src="lessons/08-polite.js"></script>
<script src="lessons/09-conditional.js"></script>
<script src="lessons/10-yt-coo5jphme6i.js"></script>
<script>
// 레슨 데이터는 lessons/*.js 에서 window.LESSONS 로 로드됨
const LESSONS = window.LESSONS || [];
let li=0, filter='all', list=[], cur=0, koShown=false;

const CONJ={talk:['talking','talked','talks','talk'],hang:['hanging','hung','hangs','hang'],
  turn:['turning','turned','turns','turn'],show:['showing','showed','shown','shows','show'],
  run:['running','ran','runs','run'],live:['living','lived','lives','live']};
function headRe(v){return new RegExp('\\b('+CONJ[v].join('|')+')\\b','i');}
function boldPhrasal(s,it){
  const tail=it.tag.split(' ').slice(1);
  let out=s.replace(headRe(it.v),'<b>$1</b>');
  tail.forEach(p=>{out=out.replace(new RegExp('(?<!<b>)\\b('+p+')\\b','i'),'<b>$1</b>');});
  return out;
}
function boldGoingto(s){
  let out=s.replace(/\b(gonna|going to)\b/i,'<b>$1</b>');
  out=out.replace(/([A-Za-z]+'ll)/,'<b>$1</b>');
  out=out.replace(/(?<!<b>)\b(won't|will)\b/i,'<b>$1</b>');
  return out;
}
function boldCond(s){var out=s.replace(/\b(as long as|as though|as if|provided that|provided|in case|even if|only if|if only|unless|if|wish)\b/i,'<b>$1</b>');out=out.replace(/(?<!<b>)\b(would have|could have|might have|would|could|might)\b/i,'<b>$1</b>');return out;}
function bold(s,it){const b=LESSONS[li].bold;if(b==='phrasal')return boldPhrasal(s,it);if(b==='goingto')return boldGoingto(s);if(b==='supposed')return s.replace(/\b(supposed to)\b/i,'<b>$1</b>');if(b==='cond')return boldCond(s);return s;}
function data(){return LESSONS[li].data;}
function ansOf(d){return LESSONS[li].choiceBy==='en'?d.en:d.tag;}

function pickVoice(){const vs=speechSynthesis.getVoices();const en=vs.filter(v=>/^en/i.test(v.lang));
  // 자연스러운 최신(온라인·신경망) 음성 우선 → 그다음 고품질 로컬 음성 → 일반 영어 음성
  const rank=v=>{const n=(v.name+' '+v.lang).toLowerCase();let s=0;
    if(/natural|neural|online/.test(n))s+=100;
    if(/google/.test(n))s+=60;
    if(/aria|jenny|libby|sonia|emma|ava|samantha/.test(n))s+=40;
    if(/zira|david|mark|hazel/.test(n))s+=10;
    if(/en[-_]us/.test(n))s+=8;else if(/en[-_]gb/.test(n))s+=5;
    if(v.localService)s+=1;return s;};
  return en.slice().sort((a,b)=>rank(b)-rank(a))[0]||null;}
function speak(t,onend){if(!('speechSynthesis' in window)){alert('이 브라우저는 음성 재생을 지원하지 않아요');return;}
  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);
  const v=pickVoice();if(v){u.voice=v;u.lang=v.lang;}else u.lang='en-US';
  u.rate=parseFloat(document.getElementById('rate').value);
  u.pitch=1.0;u.volume=1.0;
  if(onend)u.onend=onend;
  speechSynthesis.speak(u);}

function buildLessons(){const box=document.getElementById('lessons');box.innerHTML='';
  const lbl=document.createElement('label');lbl.textContent='레슨 선택';lbl.htmlFor='lessonSelect';box.appendChild(lbl);
  const sel=document.createElement('select');sel.id='lessonSelect';
  LESSONS.forEach((L,i)=>{const o=document.createElement('option');o.value=i;o.textContent=L.name;if(i===li)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>{li=+sel.value;filter='all';rebuild();};box.appendChild(sel);}
function buildFilters(){const box=document.getElementById('filters');box.innerHTML='';
  const gs=['all',...LESSONS[li].groups];
  gs.forEach(g=>{const b=document.createElement('button');b.className='chip'+(g===filter?' active':'');
    b.textContent=g==='all'?'전체':g;b.onclick=()=>{filter=g;applyFilter();};box.appendChild(b);});}
function applyFilter(){list=filter==='all'?data().slice():data().filter(d=>d.g===filter);cur=0;buildFilters();render();newQuiz();if(autoPlay)restartAuto();}
function rebuild(){buildLessons();applyFilter();}

function render(){const d=list[cur];if(!d)return;
  document.getElementById('pvtag').textContent=d.tag;
  document.getElementById('idx').textContent=(cur+1)+' / '+list.length;
  document.getElementById('en').innerHTML=bold(d.en,d);
  document.getElementById('ko').textContent=d.ko;
  document.getElementById('bar').style.width=((cur+1)/list.length*100)+'%';}
function toggleKo(){koShown=!koShown;document.getElementById('ko').classList.toggle('hidden',!koShown);}
function revealKo(){koShown=true;document.getElementById('ko').classList.remove('hidden');}
function next(){cur=(cur+1)%list.length;koShown=false;document.getElementById('ko').classList.add('hidden');render();if(autoPlay)restartAuto();else speakCurrent();}
function prev(){cur=(cur-1+list.length)%list.length;koShown=false;document.getElementById('ko').classList.add('hidden');render();if(autoPlay)restartAuto();}
function shuffle(){for(let i=list.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[list[i],list[j]]=[list[j],list[i]];}cur=0;render();if(autoPlay)restartAuto();}
function speakCurrent(){speak(list[cur].en);}

// 자동 재생: 현재 문장을 REPEAT번 읽고 다음 문장으로 자동 이동
const REPEAT=3,GAP=2000;let autoPlay=false,autoToken=0;
function toggleAuto(){setAuto(!autoPlay);}
function setAuto(on){autoPlay=on;autoToken++;speechSynthesis.cancel();
  const b=document.getElementById('autoBtn');b.classList.toggle('active',on);
  b.textContent=on?'⏸ 자동재생 중':'▶ 자동재생';
  if(on)autoRun(autoToken);}
function restartAuto(){autoToken++;speechSynthesis.cancel();autoRun(autoToken);}
function autoRun(token){if(!autoPlay||token!==autoToken||!list.length)return;
  render();
  speakTimes(list[cur].en,REPEAT,token,()=>{
    if(!autoPlay||token!==autoToken)return;
    cur=(cur+1)%list.length;koShown=false;document.getElementById('ko').classList.add('hidden');
    setTimeout(()=>autoRun(token),GAP);});}
function speakTimes(text,times,token,done){if(!autoPlay||token!==autoToken)return;
  speak(text,()=>{if(!autoPlay||token!==autoToken)return;
    if(times>1)setTimeout(()=>speakTimes(text,times-1,token,done),GAP);
    else done();});}
function rateLbl(){document.getElementById('rateLbl').textContent=document.getElementById('rate').value+'x';}

let qmode='dict',q=null,right=0,total=0,answered=false;
function setQmode(m){qmode=m;
  document.getElementById('qmDict').classList.toggle('active',m==='dict');
  document.getElementById('qmChoice').classList.toggle('active',m==='choice');
  document.getElementById('dictBox').style.display=m==='dict'?'block':'none';
  document.getElementById('choiceBox').style.display=m==='choice'?'block':'none';
  newQuiz();}
function newQuiz(){answered=false;if(!list.length)return;
  q=list[Math.random()*list.length|0];
  document.getElementById('qpvtag').textContent=qmode==='choice'?'?':q.tag;
  document.getElementById('qko').textContent=q.ko;
  document.getElementById('qinput').value='';
  document.getElementById('dictFb').innerHTML='';
  document.getElementById('qcko').textContent=q.ko;
  const cb=LESSONS[li].choiceBy;
  document.getElementById('choicePrompt').textContent=LESSONS[li].choicePrompt||(cb==='en'?'위 뜻에 맞는 속담(영어)을 고르세요':(LESSONS[li].bold==='phrasal'?'위 뜻에 알맞은 구동사를 고르세요':'위 문장에 어울리는 유형/뉘앙스를 고르세요'));
  buildChoices();
  document.getElementById('choiceFb').innerHTML='';}
function speakQuiz(){speak(q.en);}
function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();}
function checkDict(){if(answered){nextQuiz();return;}
  const ans=norm(document.getElementById('qinput').value),target=norm(q.en);
  const fb=document.getElementById('dictFb');total++;answered=true;
  if(ans===target){right++;fb.innerHTML='<span class="ok">✅ 정확해요!</span>';}
  else{const tw=target.split(' '),aw=ans.split(' ');
    const h=tw.map((w,i)=>aw[i]===w?w:'<span class="miss">'+w+'</span>').join(' ');
    fb.innerHTML='<span class="no">❌ 다시 확인</span><br>정답: <span class="diff">'+h+'</span><br><span style="color:var(--muted)">'+q.en+'</span>';}
  updateScore();}
function hintDict(){const w=q.en.split(' ');
  document.getElementById('dictFb').innerHTML='<span style="color:var(--muted)">힌트: '+w.map(x=>x[0]+'___').join(' ')+' ('+w.length+'단어)</span>';}
function buildChoices(){const box=document.getElementById('choices');box.innerHTML='';
  const correct=ansOf(q);
  const pool=[...new Set(data().map(ansOf).filter(p=>p!==correct))];
  for(let i=pool.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pool[i],pool[j]]=[pool[j],pool[i]];}
  let opts=[correct,...pool.slice(0,3)];
  for(let i=opts.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[opts[i],opts[j]]=[opts[j],opts[i]];}
  opts.forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;
    b.onclick=()=>pickChoice(b,o,correct);box.appendChild(b);});}
function pickChoice(btn,chosen,correct){if(answered)return;answered=true;total++;
  document.querySelectorAll('#choices .choice').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
  const detail=bold(q.en,q)+'<br><span style="color:var(--muted)">'+q.ko+'</span>';
  if(chosen===correct){right++;document.getElementById('choiceFb').innerHTML='<span class="ok">✅ 정답!</span><br>'+detail;}
  else{btn.classList.add('wrong');document.getElementById('choiceFb').innerHTML='<span class="no">❌ 오답</span><br>'+detail;}
  speak(q.en);updateScore();}
function nextQuiz(){newQuiz();}
function updateScore(){document.getElementById('score').textContent='점수: '+right+' / '+total+' ('+(total?Math.round(right/total*100):0)+'%)';}

function setTab(t){if(t!=='study'&&autoPlay)setAuto(false);
  document.getElementById('study').style.display=t==='study'?'block':'none';
  document.getElementById('quiz').style.display=t==='quiz'?'block':'none';
  document.getElementById('tabStudy').classList.toggle('active',t==='study');
  document.getElementById('tabQuiz').classList.toggle('active',t==='quiz');
  speechSynthesis.cancel();}

// keyboard shortcuts (dictation mode): 3=듣기, 1=확인, 2=다음
document.addEventListener('keydown',function(e){
  const quizVisible=document.getElementById('quiz').style.display!=='none';
  if(!quizVisible||qmode!=='dict')return;
  if(e.key==='3'){e.preventDefault();speakQuiz();}
  else if(e.key==='1'){e.preventDefault();checkDict();}
  else if(e.key==='2'){e.preventDefault();nextQuiz();}
});

buildLessons();applyFilter();rateLbl();
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();}
</script>
</body>
</html>
