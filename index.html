<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 쉐도잉 연습 · 구동사 + be going to + 속담</title>
<style>
  :root{--bg:#0f1226;--card:#1a1f3d;--card2:#232a52;--accent:#7c8cff;--accent2:#4ad0c0;
    --text:#eef1ff;--muted:#9aa3d0;--good:#3ddc84;--bad:#ff6b7d;--shadow:0 10px 30px rgba(0,0,0,.35);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    background:radial-gradient(1200px 600px at 20% -10%,#26306a 0%,transparent 60%),var(--bg);
    color:var(--text);min-height:100vh;padding:18px;}
  .wrap{max-width:760px;margin:0 auto;}
  header{text-align:center;margin:8px 0 14px;position:relative;}
  .refresh{position:absolute;top:0;right:0;border:1px solid #2c3566;background:var(--card);color:var(--text);
    width:38px;height:38px;border-radius:12px;font-size:16px;cursor:pointer;transition:.15s;line-height:1}
  .refresh:hover{background:var(--card2)}
  .refresh:active{transform:rotate(180deg) scale(.92)}
  header h1{font-size:20px;letter-spacing:-.3px}
  header p{color:var(--muted);font-size:12px;margin-top:5px}
  .lessons{position:relative;margin-bottom:12px}
  .lessons label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:0 0 6px 4px;letter-spacing:.3px}
  .lessons select{width:100%;appearance:none;-webkit-appearance:none;
    border:1px solid #2c3566;background:linear-gradient(135deg,var(--accent),#5a6bd8);color:#fff;
    padding:13px 42px 13px 16px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;
    line-height:1.3;transition:.15s;box-shadow:var(--shadow)}
  .lessons select:focus{outline:none;border-color:var(--accent2)}
  .lessons select option{background:var(--card);color:var(--text);font-weight:600}
  .lessons::after{content:'▾';position:absolute;right:16px;bottom:13px;color:#fff;font-size:14px;pointer-events:none}
  .tabs{display:flex;gap:8px;background:var(--card);padding:6px;border-radius:14px;margin-bottom:14px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px;border-radius:10px;
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .tabs button.active{background:var(--accent);color:#fff}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
  .chip{background:var(--card);color:var(--text);border:1px solid #2c3566;border-radius:10px;
    padding:8px 12px;font-size:12px;cursor:pointer}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .chipwrap{display:flex;flex-wrap:wrap;gap:6px}
  .card{background:linear-gradient(160deg,var(--card),var(--card2));border-radius:20px;padding:26px 22px;
    box-shadow:var(--shadow);margin-bottom:14px}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;color:var(--muted)}
  .pvtag{background:rgba(124,140,255,.18);color:#c3ccff;padding:4px 10px;border-radius:20px;font-weight:700}
  .en{font-size:22px;line-height:1.5;font-weight:600;margin:6px 0 4px}
  .en b{color:var(--accent2)}
  .ko{font-size:15px;color:var(--muted);line-height:1.5;margin-top:10px;min-height:22px;transition:.2s}
  .ko.hidden{filter:blur(7px);opacity:.5}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;align-items:center}
  .btn{border:0;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
  .btn.play{background:var(--accent2);color:#04201c}
  .btn.ghost{background:var(--card2);color:var(--text);border:1px solid #333c6e}
  .btn.auto{background:var(--card2);color:var(--text);border:1px solid #333c6e}
  .btn.auto.active{background:linear-gradient(135deg,var(--accent),#5a6bd8);color:#fff;border-color:transparent}
  .btn:active{transform:scale(.96)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px}
  .nav .btn{flex:1}
  .speed{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  input[type=range]{accent-color:var(--accent2)}
  .progress{height:6px;background:var(--card);border-radius:6px;overflow:hidden;margin-bottom:14px}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s}
  .counter{text-align:center;color:var(--muted);font-size:13px;margin-top:4px}
  .qinput{width:100%;background:var(--card);border:1px solid #2c3566;border-radius:12px;color:var(--text);
    padding:14px;font-size:16px;margin-top:16px}
  .feedback{margin-top:14px;font-size:14px;line-height:1.6;min-height:20px}
  .feedback .ok{color:var(--good);font-weight:700}
  .feedback .no{color:var(--bad);font-weight:700}
  .diff .miss{background:rgba(255,107,125,.25);border-radius:4px;padding:0 2px}
  .choices{display:grid;gap:10px;margin-top:16px}
  .choice{text-align:left;background:var(--card);border:1px solid #2c3566;color:var(--text);
    padding:14px;border-radius:12px;cursor:pointer;font-size:15px;transition:.12s}
  .choice:hover{border-color:var(--accent)}
  .choice.correct{background:rgba(61,220,132,.18);border-color:var(--good)}
  .choice.wrong{background:rgba(255,107,125,.18);border-color:var(--bad)}
  .score{text-align:center;font-size:13px;color:var(--muted);margin-top:10px}
  .qmode{display:flex;gap:8px;margin-bottom:12px}
  .qmode button{flex:1}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6}
  footer{text-align:center;color:var(--muted);font-size:11px;margin:24px 0 8px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="refresh" onclick="location.reload()" title="새로고침">🔄</button>
    <h1>🎬 영어 쉐도잉 연습</h1>
    <p>미드 스타일 필수 표현 · 레슨을 골라 연습하세요</p>
  </header>

  <div class="lessons" id="lessons"></div>

  <div class="tabs">
    <button id="tabStudy" class="active" onclick="setTab('study')">📖 학습·쉐도잉</button>
    <button id="tabQuiz" onclick="setTab('quiz')">✍️ 퀴즈·받아쓰기</button>
  </div>

  <div class="controls"><div class="chipwrap" id="filters"></div></div>

  <section id="study">
    <div class="progress"><div id="bar"></div></div>
    <div class="card">
      <div class="meta"><span class="pvtag" id="pvtag"></span><span id="idx"></span></div>
      <div class="en" id="en"></div>
      <div class="ko hidden" id="ko" onclick="revealKo()"></div>
      <div class="row">
        <button class="btn play" onclick="speakCurrent()">🔊 듣기</button>
        <button class="btn ghost" onclick="toggleKo()">🇰🇷 뜻 보기</button>
        <button class="btn auto" id="autoBtn" onclick="toggleAuto()">▶ 자동재생</button>
        <div class="speed">속도 <input type="range" min="0.5" max="1.2" step="0.1" value="0.9" id="rate" oninput="rateLbl()"><span id="rateLbl">0.9x</span></div>
      </div>
      <div class="nav">
        <button class="btn ghost" onclick="prev()">◀ 이전</button>
        <button class="btn ghost" onclick="shuffle()">🔀 섞기</button>
        <button class="btn ghost" onclick="next()">다음 ▶</button>
      </div>
    </div>
    <div class="counter">문장을 클릭하면 뜻이 나와요 · 🔊로 여러 번 따라 말해보세요</div>
  </section>

  <section id="quiz" style="display:none">
    <div class="qmode">
      <button class="btn ghost active" id="qmDict" onclick="setQmode('dict')">받아쓰기</button>
      <button class="btn ghost" id="qmChoice" onclick="setQmode('choice')">뜻 맞히기</button>
    </div>
    <div class="card">
      <div class="meta"><span class="pvtag" id="qpvtag">?</span><span id="qidx"></span></div>
      <div id="dictBox">
        <div class="ko" id="qko" style="font-size:17px;color:var(--text)"></div>
        <button class="btn play" style="margin-top:14px" onclick="speakQuiz()">🔊 듣고 받아쓰기</button>
        <input class="qinput" id="qinput" placeholder="들은 문장을 영어로 입력하세요" autocomplete="off" onkeydown="if(event.key==='Enter')checkDict()">
        <div class="row">
          <button class="btn play" onclick="checkDict()">확인</button>
          <button class="btn ghost" onclick="hintDict()">힌트</button>
          <button class="btn ghost" onclick="nextQuiz()">다음 ▶</button>
        </div>
        <div class="feedback" id="dictFb"></div>
        <div class="hint">⌨️ 단축키 — <b>3</b>: 듣기 · <b>1</b>: 확인 · <b>2</b>: 다음 문장 · <b>Enter</b>: 확인</div>
      </div>
      <div id="choiceBox" style="display:none">
        <div class="ko" id="qcko" style="font-size:17px;color:var(--text)"></div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px" id="choicePrompt"></div>
        <div class="choices" id="choices"></div>
        <div class="row"><button class="btn ghost" onclick="nextQuiz()">다음 ▶</button></div>
        <div class="feedback" id="choiceFb"></div>
      </div>
    </div>
    <div class="score" id="score">점수: 0 / 0</div>
  </section>

  <footer>
    예문·속담은 각 주제를 학습하기 위해 정리한 것으로, 널리 알려진 표현과 새로 작성한 오리지널 문장입니다.<br>
    음성은 브라우저 내장 TTS(Web Speech API) · Chrome·Edge 권장.
  </footer>
</div>

<script>
const LESSONS = [{"id":"phrasal","name":"Lesson 1 · 구동사 100","gl":"동사","groups":["talk","hang","turn","show","run","live"],"bold":"phrasal","choiceBy":"tag","data":[{"g":"talk","tag":"talk about","en":"We need to talk about what happened last night.","ko":"어젯밤에 있었던 일에 대해 얘기 좀 해야겠어.","v":"talk"},{"g":"talk","tag":"talk to","en":"Can I talk to you for a second?","ko":"잠깐 얘기 좀 할 수 있을까?","v":"talk"},{"g":"talk","tag":"talk into","en":"She talked me into going to the party.","ko":"걔가 나를 설득해서 파티에 가게 만들었어.","v":"talk"},{"g":"talk","tag":"talk out of","en":"I tried to talk him out of quitting his job.","ko":"난 그가 직장을 그만두지 않도록 설득하려 했어.","v":"talk"},{"g":"talk","tag":"talk back","en":"Don't talk back to your mother.","ko":"엄마한테 말대꾸하지 마.","v":"talk"},{"g":"talk","tag":"talk over","en":"Let's talk it over before we decide.","ko":"결정하기 전에 그것에 대해 충분히 상의해 보자.","v":"talk"},{"g":"talk","tag":"talk down to","en":"I hate the way he talks down to everyone.","ko":"그가 모두를 깔보듯 말하는 게 정말 싫어.","v":"talk"},{"g":"talk","tag":"talk through","en":"Let me talk you through the whole plan.","ko":"내가 계획 전체를 차근차근 설명해 줄게.","v":"talk"},{"g":"talk","tag":"talk up","en":"He kept talking up his new business all night.","ko":"그는 밤새 자기 새 사업을 잔뜩 띄워댔어.","v":"talk"},{"g":"talk","tag":"talk sense into","en":"Somebody needs to talk some sense into her.","ko":"누군가 그녀를 정신 차리게 타일러야 해.","v":"talk"},{"g":"talk","tag":"talk around","en":"Stop talking around the issue and be honest.","ko":"문제를 빙빙 돌려 말하지 말고 솔직해져.","v":"talk"},{"g":"talk","tag":"talk out","en":"We stayed up all night talking things out.","ko":"우린 밤새워 문제를 다 털어놓고 얘기했어.","v":"talk"},{"g":"talk","tag":"talk into","en":"Don't let them talk you into anything crazy.","ko":"걔네가 널 꼬드겨서 이상한 짓 하게 두지 마.","v":"talk"},{"g":"talk","tag":"talk over","en":"He always talks over me in meetings.","ko":"그는 회의 때마다 내 말을 끊고 자기 말만 해.","v":"talk"},{"g":"talk","tag":"talk up","en":"Everyone's talking up that new restaurant.","ko":"다들 그 새 식당 얘기를 입에 침이 마르게 해.","v":"talk"},{"g":"talk","tag":"talk about","en":"Talk about bad timing—he called during dinner.","ko":"타이밍 하나는 기막히지, 저녁 먹는데 전화했어.","v":"talk"},{"g":"hang","tag":"hang out","en":"Do you want to hang out this weekend?","ko":"이번 주말에 같이 놀래?","v":"hang"},{"g":"hang","tag":"hang on","en":"Hang on a second, I'll be right back.","ko":"잠깐만 기다려, 금방 돌아올게.","v":"hang"},{"g":"hang","tag":"hang up","en":"Don't you dare hang up on me!","ko":"감히 내 전화를 끊지 마!","v":"hang"},{"g":"hang","tag":"hang in there","en":"I know it's hard, but hang in there.","ko":"힘든 거 아는데, 조금만 버텨.","v":"hang"},{"g":"hang","tag":"hang around","en":"I don't want you hanging around those guys.","ko":"난 네가 그 애들이랑 어울려 다니는 게 싫어.","v":"hang"},{"g":"hang","tag":"hang back","en":"She hung back while everyone else went in.","ko":"다들 들어가는데 그녀는 뒤에 남아 머뭇거렸어.","v":"hang"},{"g":"hang","tag":"hang over","en":"The deadline is hanging over my head.","ko":"마감이 내 머리 위에 짐처럼 걸려 있어.","v":"hang"},{"g":"hang","tag":"hang on to","en":"Hang on to that receipt, you might need it.","ko":"그 영수증 잘 갖고 있어, 필요할지도 몰라.","v":"hang"},{"g":"hang","tag":"hang out","en":"We used to hang out here all the time.","ko":"우린 예전에 여기서 맨날 어울렸었지.","v":"hang"},{"g":"hang","tag":"hang up","en":"He hung up before I could explain.","ko":"내가 설명하기도 전에 그가 전화를 끊었어.","v":"hang"},{"g":"hang","tag":"hang on","en":"Hang on—are you saying you knew all along?","ko":"잠깐, 그러니까 넌 처음부터 알고 있었다는 거야?","v":"hang"},{"g":"hang","tag":"hang around","en":"There's no reason to hang around here anymore.","ko":"더 이상 여기서 어슬렁거릴 이유가 없어.","v":"hang"},{"g":"hang","tag":"hang in there","en":"Just hang in there a little longer, okay?","ko":"조금만 더 버텨줘, 알았지?","v":"hang"},{"g":"hang","tag":"hang out with","en":"Who did you hang out with last night?","ko":"어젯밤에 누구랑 놀았어?","v":"hang"},{"g":"hang","tag":"hang up on","en":"She got mad and hung up on him.","ko":"그녀는 화가 나서 그의 전화를 끊어 버렸어.","v":"hang"},{"g":"hang","tag":"hang over","en":"That mistake has been hanging over me for years.","ko":"그 실수가 몇 년째 나를 짓누르고 있어.","v":"hang"},{"g":"turn","tag":"turn on","en":"Can you turn on the lights, please?","ko":"불 좀 켜 줄래?","v":"turn"},{"g":"turn","tag":"turn off","en":"Don't forget to turn off the stove.","ko":"가스레인지 끄는 거 잊지 마.","v":"turn"},{"g":"turn","tag":"turn up","en":"Turn up the volume, I love this song.","ko":"소리 좀 키워, 나 이 노래 완전 좋아해.","v":"turn"},{"g":"turn","tag":"turn down","en":"She turned down the job offer.","ko":"그녀는 그 일자리 제안을 거절했어.","v":"turn"},{"g":"turn","tag":"turn out","en":"It turned out he was lying the whole time.","ko":"알고 보니 그는 처음부터 거짓말을 하고 있었어.","v":"turn"},{"g":"turn","tag":"turn into","en":"This is turning into a total disaster.","ko":"이거 완전히 엉망진창이 되어 가고 있어.","v":"turn"},{"g":"turn","tag":"turn over","en":"He turned over and went back to sleep.","ko":"그는 돌아누워 다시 잠들었어.","v":"turn"},{"g":"turn","tag":"turn around","en":"Give me a chance to turn things around.","ko":"상황을 되돌릴 기회를 한 번만 줘.","v":"turn"},{"g":"turn","tag":"turn in","en":"I'm exhausted, I think I'll turn in early.","ko":"완전 지쳤어, 일찍 자러 가야겠어.","v":"turn"},{"g":"turn","tag":"turn away","en":"They turned us away at the door.","ko":"그들은 문 앞에서 우릴 돌려보냈어.","v":"turn"},{"g":"turn","tag":"turn to","en":"You can always turn to me for help.","ko":"도움이 필요하면 언제든 나한테 기대도 돼.","v":"turn"},{"g":"turn","tag":"turn against","en":"His own family turned against him.","ko":"그의 가족마저 그에게 등을 돌렸어.","v":"turn"},{"g":"turn","tag":"turn down","en":"Can you turn the music down a bit?","ko":"음악 소리 좀 줄여 줄래?","v":"turn"},{"g":"turn","tag":"turn up","en":"He finally turned up two hours late.","ko":"그는 두 시간이나 늦게 겨우 나타났어.","v":"turn"},{"g":"turn","tag":"turn out","en":"Everything's going to turn out fine.","ko":"다 잘 될 거야.","v":"turn"},{"g":"turn","tag":"turn into","en":"Our little argument turned into a huge fight.","ko":"작은 말다툼이 큰 싸움으로 번졌어.","v":"turn"},{"g":"turn","tag":"turn on","en":"Why is everyone turning on me all of a sudden?","ko":"왜 갑자기 다들 나한테 등을 돌리는 거야?","v":"turn"},{"g":"turn","tag":"turn back","en":"There's no turning back now.","ko":"이제 되돌릴 수 없어.","v":"turn"},{"g":"show","tag":"show up","en":"He didn't show up to his own party.","ko":"그는 자기 파티에도 나타나지 않았어.","v":"show"},{"g":"show","tag":"show off","en":"Stop showing off in front of everyone.","ko":"다들 앞에서 그만 좀 잘난 척해.","v":"show"},{"g":"show","tag":"show around","en":"Let me show you around the office.","ko":"사무실 여기저기 구경시켜 줄게.","v":"show"},{"g":"show","tag":"show up","en":"You could've at least shown up on time.","ko":"적어도 제시간에 오기라도 하지 그랬어.","v":"show"},{"g":"show","tag":"show off","en":"He bought that car just to show off.","ko":"그는 오로지 과시하려고 그 차를 샀어.","v":"show"},{"g":"show","tag":"show in","en":"Please show the guests in.","ko":"손님들을 안으로 모셔 들여 주세요.","v":"show"},{"g":"show","tag":"show out","en":"Don't worry, I'll show myself out.","ko":"신경 쓰지 마, 나 혼자 나갈게.","v":"show"},{"g":"show","tag":"show up","en":"Look who finally showed up!","ko":"이제야 나타났네, 누구신가 했네!","v":"show"},{"g":"show","tag":"show off","en":"She loves showing off her new ring.","ko":"그녀는 새 반지 자랑하는 걸 정말 좋아해.","v":"show"},{"g":"show","tag":"show around","en":"Someone will show you around tomorrow.","ko":"내일 누군가 널 안내해 줄 거야.","v":"show"},{"g":"show","tag":"show up for","en":"Thanks for showing up for me today.","ko":"오늘 날 위해 와 줘서 고마워.","v":"show"},{"g":"show","tag":"show through","en":"Her kindness always shows through.","ko":"그녀의 다정함은 늘 자연스럽게 드러나.","v":"show"},{"g":"show","tag":"show up","en":"He's always trying to show me up at work.","ko":"그는 직장에서 늘 나보다 잘나 보이려고 해.","v":"show"},{"g":"show","tag":"show up","en":"The results should show up any minute now.","ko":"결과가 이제 곧 뜰 거야.","v":"show"},{"g":"show","tag":"show around","en":"Would you mind showing her around town?","ko":"그녀에게 동네 좀 구경시켜 줄 수 있어?","v":"show"},{"g":"show","tag":"show up","en":"Nobody showed up, so we canceled it.","ko":"아무도 안 와서 우린 그걸 취소했어.","v":"show"},{"g":"run","tag":"run into","en":"Guess who I ran into at the mall today.","ko":"오늘 쇼핑몰에서 누구를 우연히 만났게.","v":"run"},{"g":"run","tag":"run out of","en":"We're running out of time.","ko":"우리 시간이 다 떨어져 가고 있어.","v":"run"},{"g":"run","tag":"run away","en":"You can't just run away from your problems.","ko":"네 문제들로부터 그냥 도망칠 수는 없어.","v":"run"},{"g":"run","tag":"run over","en":"A car almost ran over the dog.","ko":"차가 그 개를 칠 뻔했어.","v":"run"},{"g":"run","tag":"run late","en":"Sorry, I'm running a little late.","ko":"미안, 나 좀 늦을 것 같아.","v":"run"},{"g":"run","tag":"run by","en":"Can I run something by you real quick?","ko":"잠깐 뭐 하나 의견 좀 물어봐도 될까?","v":"run"},{"g":"run","tag":"run through","en":"Let's run through the plan one more time.","ko":"계획을 한 번 더 훑어보자.","v":"run"},{"g":"run","tag":"run out","en":"The milk ran out this morning.","ko":"오늘 아침에 우유가 다 떨어졌어.","v":"run"},{"g":"run","tag":"run into","en":"I keep running into the same problem.","ko":"난 계속 똑같은 문제에 부딪히고 있어.","v":"run"},{"g":"run","tag":"run after","en":"He ran after the bus but missed it.","ko":"그는 버스를 쫓아 뛰었지만 놓쳤어.","v":"run"},{"g":"run","tag":"run down","en":"Let me run down the list for you.","ko":"내가 목록을 쭉 짚어 줄게.","v":"run"},{"g":"run","tag":"run out of","en":"I've run out of excuses.","ko":"이제 둘러댈 핑계도 다 떨어졌어.","v":"run"},{"g":"run","tag":"run off","en":"He ran off without saying goodbye.","ko":"그는 작별 인사도 없이 도망치듯 가 버렸어.","v":"run"},{"g":"run","tag":"run late","en":"The meeting is running late again.","ko":"회의가 또 예정보다 길어지고 있어.","v":"run"},{"g":"run","tag":"run by","en":"I'll run it by my boss and get back to you.","ko":"상사한테 물어보고 다시 연락줄게.","v":"run"},{"g":"run","tag":"run into","en":"We ran into some trouble on the way.","ko":"오는 길에 문제가 좀 생겼어.","v":"run"},{"g":"run","tag":"run out","en":"Time's running out, we have to decide now.","ko":"시간이 없어, 지금 결정해야 해.","v":"run"},{"g":"live","tag":"live up to","en":"The movie didn't live up to the hype.","ko":"그 영화는 기대에 미치지 못했어.","v":"live"},{"g":"live","tag":"live on","en":"His music will live on forever.","ko":"그의 음악은 영원히 살아남을 거야.","v":"live"},{"g":"live","tag":"live through","en":"I can't believe we lived through that.","ko":"우리가 그걸 겪고도 살아남았다는 게 믿기지 않아.","v":"live"},{"g":"live","tag":"live with","en":"It's a mistake I have to live with.","ko":"그건 내가 안고 살아가야 할 실수야.","v":"live"},{"g":"live","tag":"live off","en":"He's still living off his parents.","ko":"그는 아직도 부모님한테 얹혀살고 있어.","v":"live"},{"g":"live","tag":"live it up","en":"We lived it up on our last night in Paris.","ko":"우린 파리에서의 마지막 밤을 신나게 즐겼어.","v":"live"},{"g":"live","tag":"live down","en":"He'll never live down that embarrassing moment.","ko":"그는 그 창피한 순간을 평생 못 잊고 살 거야.","v":"live"},{"g":"live","tag":"live up to","en":"You don't have to live up to their expectations.","ko":"넌 그들의 기대에 부응하지 않아도 돼.","v":"live"},{"g":"live","tag":"live on","en":"How do you live on so little sleep?","ko":"그렇게 조금 자고 어떻게 버티는 거야?","v":"live"},{"g":"live","tag":"live for","en":"She lives for moments like this.","ko":"그녀는 이런 순간을 위해 살아.","v":"live"},{"g":"live","tag":"live with","en":"Can you live with the consequences?","ko":"그 결과를 감당하고 살 수 있겠어?","v":"live"},{"g":"live","tag":"live through","en":"They lived through the war together.","ko":"그들은 함께 전쟁을 겪어냈어.","v":"live"},{"g":"live","tag":"live off of","en":"You can't live off of coffee alone.","ko":"커피만 마시고 살 순 없어.","v":"live"},{"g":"live","tag":"live up to","en":"This place totally lives up to its reputation.","ko":"이곳은 명성에 정말 걸맞은 곳이야.","v":"live"},{"g":"live","tag":"live on","en":"Her memory lives on in all of us.","ko":"그녀에 대한 기억은 우리 모두 안에 살아 있어.","v":"live"},{"g":"live","tag":"live it up","en":"You're young—go live it up!","ko":"넌 젊잖아, 나가서 인생을 즐겨!","v":"live"},{"g":"live","tag":"live with","en":"I don't know how you live with him.","ko":"난 네가 어떻게 그 사람이랑 사는지 모르겠어.","v":"live"}]},{"id":"goingto","name":"Lesson 2 · be going to 100","gl":"유형","groups":["계획·의도","예측·징조","gonna 구어","will 대조","질문·부정"],"bold":"goingto","choiceBy":"tag","data":[{"g":"계획·의도","tag":"계획한 일","en":"I'm going to quit my job next month.","ko":"나 다음 달에 회사 그만둘 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to get married in the fall.","ko":"우리 가을에 결혼할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"She's going to study abroad next year.","ko":"걔 내년에 유학 갈 거야."},{"g":"계획·의도","tag":"계획한 일","en":"They're going to move to a bigger place.","ko":"걔네 더 큰 집으로 이사할 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to tell him the truth tonight.","ko":"오늘 밤에 그에게 사실대로 말할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"He's going to propose this weekend.","ko":"걔 이번 주말에 프러포즈할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to start our own business.","ko":"우린 우리 사업을 시작할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"I'm going to learn how to drive this summer.","ko":"이번 여름에 운전 배울 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to call her as soon as I get home.","ko":"집에 도착하자마자 걔한테 전화할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to redecorate the whole house.","ko":"우리 집 전체를 새로 꾸밀 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to save up for a new car.","ko":"새 차 사려고 돈 모을 거야."},{"g":"계획·의도","tag":"계획한 일","en":"She's going to take a year off after graduation.","ko":"걔 졸업하고 1년 쉴 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to ask for a raise tomorrow.","ko":"나 내일 월급 올려달라고 할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to visit my parents this weekend.","ko":"우리 이번 주말에 부모님 뵈러 갈 거야."},{"g":"계획·의도","tag":"계획한 일","en":"I'm going to finish this project by Friday.","ko":"금요일까지 이 프로젝트 끝낼 거야."},{"g":"계획·의도","tag":"계획한 일","en":"They're going to adopt a dog next month.","ko":"걔네 다음 달에 강아지 입양할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"I'm going to cook something special tonight.","ko":"오늘 밤에 특별한 요리 할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to throw her a surprise party.","ko":"우리 걔한테 깜짝 파티 열어줄 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to sign up for the gym on Monday.","ko":"월요일에 헬스장 등록할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"She's going to change her major.","ko":"걔 전공 바꿀 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to travel across Europe.","ko":"우리 유럽 일주 할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"He's going to run for office someday.","ko":"걔 언젠가 공직에 출마할 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to make things right.","ko":"내가 다 바로잡을 거야."},{"g":"계획·의도","tag":"결심·의도","en":"I'm going to stop making excuses.","ko":"이제 핑계 대는 거 그만할 거야."},{"g":"계획·의도","tag":"계획한 일","en":"We're going to name the baby after my grandfather.","ko":"우리 아기 이름을 할아버지 이름 따서 지을 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"Look at those clouds—it's going to rain.","ko":"저 구름 좀 봐, 비 올 것 같아."},{"g":"예측·징조","tag":"눈앞의 징조","en":"Watch out, you're going to fall!","ko":"조심해, 너 넘어지겠어!"},{"g":"예측·징조","tag":"근거 있는 예측","en":"This is going to be a long night.","ko":"오늘 밤 길어지겠는데."},{"g":"예측·징조","tag":"눈앞의 징조","en":"She's going to have a baby.","ko":"걔 곧 아기 낳을 거야."},{"g":"예측·징조","tag":"눈앞의 징조","en":"I feel like I'm going to throw up.","ko":"토할 것 같아."},{"g":"예측·징조","tag":"눈앞의 징조","en":"That vase is going to fall off the shelf.","ko":"저 꽃병 선반에서 떨어지겠어."},{"g":"예측·징조","tag":"근거 있는 예측","en":"We're going to be late if we don't leave now.","ko":"지금 안 나가면 우리 늦을 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"He's going to be so mad when he finds out.","ko":"걔 알면 엄청 화낼 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"This plan is never going to work.","ko":"이 계획은 절대 안 될 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"I knew this was going to happen.","ko":"이렇게 될 줄 알았어."},{"g":"예측·징조","tag":"근거 있는 예측","en":"You're going to love this place.","ko":"너 이곳 완전 마음에 들 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"The traffic is going to be terrible.","ko":"차 엄청 막힐 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"She's going to say no, trust me.","ko":"걔 거절할 거야, 내 말 믿어."},{"g":"예측·징조","tag":"근거 있는 예측","en":"It's going to be a beautiful day.","ko":"오늘 날씨 좋겠는데."},{"g":"예측·징조","tag":"눈앞의 징조","en":"This is going to hurt a little.","ko":"이거 조금 아플 거예요."},{"g":"예측·징조","tag":"근거 있는 예측","en":"They're going to win this one.","ko":"걔네 이번엔 이길 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"I have a feeling something's going to go wrong.","ko":"뭔가 잘못될 것 같은 느낌이야."},{"g":"예측·징조","tag":"눈앞의 징조","en":"The battery's going to die soon.","ko":"배터리 곧 나가겠어."},{"g":"예측·징조","tag":"근거 있는 예측","en":"You're going to regret this.","ko":"너 이거 후회할 거야."},{"g":"예측·징조","tag":"근거 있는 예측","en":"Everything's going to be okay.","ko":"다 괜찮아질 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna grab some coffee, want some?","ko":"나 커피 좀 사올 건데, 너도 마실래?"},{"g":"gonna 구어","tag":"gonna(구어)","en":"What are you gonna do about it?","ko":"그거 어떻게 할 건데?"},{"g":"gonna 구어","tag":"gonna(구어)","en":"We're gonna be just fine.","ko":"우린 괜찮을 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm not gonna lie, that was scary.","ko":"솔직히 말하면, 그거 무서웠어."},{"g":"gonna 구어","tag":"gonna(구어)","en":"You're gonna have to trust me on this.","ko":"이건 날 믿어야 할 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"He's gonna kill me when he sees this.","ko":"걔 이거 보면 날 잡으려 들 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna make you proud.","ko":"널 자랑스럽게 해줄게."},{"g":"gonna 구어","tag":"gonna(구어)","en":"This is gonna be epic.","ko":"이거 완전 대박일 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"Are you gonna finish that?","ko":"그거 다 먹을 거야?"},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna need a bigger bag.","ko":"더 큰 가방이 필요하겠어."},{"g":"gonna 구어","tag":"gonna(구어)","en":"We're gonna figure this out together.","ko":"우리 같이 방법 찾을 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna miss you so much.","ko":"네가 너무 보고 싶을 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"It's gonna take a while.","ko":"시간 좀 걸릴 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"You're gonna be great, don't worry.","ko":"너 잘할 거야, 걱정 마."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna tell you a secret.","ko":"비밀 하나 말해줄게."},{"g":"gonna 구어","tag":"gonna(구어)","en":"That's gonna leave a mark.","ko":"그거 자국 남겠는데."},{"g":"gonna 구어","tag":"gonna(구어)","en":"We're gonna need more time.","ko":"시간이 더 필요할 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna crash, I'm exhausted.","ko":"나 뻗을 거야, 완전 지쳤어."},{"g":"gonna 구어","tag":"gonna(구어)","en":"Nobody's gonna believe this.","ko":"아무도 이걸 안 믿을 거야."},{"g":"gonna 구어","tag":"gonna(구어)","en":"I'm gonna get to the bottom of this.","ko":"이 일의 진상을 밝혀낼 거야."},{"g":"will 대조","tag":"will · 즉흥 결정","en":"That's the doorbell—I'll get it!","ko":"초인종이네, 내가 나갈게! (그 자리에서 결정)"},{"g":"will 대조","tag":"will · 즉흥 결정","en":"Don't worry, I'll help you.","ko":"걱정 마, 내가 도와줄게. (즉석 결정)"},{"g":"will 대조","tag":"will · 즉흥 결정","en":"I'll have the steak, please.","ko":"스테이크로 할게요. (주문 즉석 결정)"},{"g":"will 대조","tag":"will · 의지","en":"Fine, I'll do it myself.","ko":"알았어, 내가 직접 할게. (그 순간의 의지)"},{"g":"will 대조","tag":"will · 약속","en":"I promise I won't tell anyone.","ko":"아무한테도 말 안 할게, 약속해. (약속)"},{"g":"will 대조","tag":"will · 막연한 예측","en":"Someday you'll understand.","ko":"언젠가 넌 이해하게 될 거야. (막연한 예측)"},{"g":"will 대조","tag":"will · 막연한 예측","en":"I think it'll be fine.","ko":"괜찮을 것 같아. (근거 없는 추측)"},{"g":"will 대조","tag":"will · 안내","en":"That'll be twenty dollars.","ko":"20달러입니다. (안내·계산)"},{"g":"will 대조","tag":"will · 약속","en":"I'll call you later, okay?","ko":"이따 전화할게, 알았지? (약속)"},{"g":"will 대조","tag":"will · 막연한 예측","en":"Maybe she'll change her mind.","ko":"어쩌면 걔 마음이 바뀔지도 몰라. (막연한 추측)"},{"g":"will 대조","tag":"will · 지켜보기","en":"We'll see what happens.","ko":"어떻게 되는지 보자. (지켜보기)"},{"g":"will 대조","tag":"will · 약속","en":"I'll be there in five minutes.","ko":"5분 안에 갈게. (즉석 약속)"},{"g":"will 대조","tag":"will · 경고","en":"Careful, or you'll wake the baby.","ko":"조심해, 안 그러면 아기 깨워. (경고)"},{"g":"will 대조","tag":"will · 의지","en":"I won't let you down.","ko":"널 실망시키지 않을게. (강한 의지)"},{"g":"will 대조","tag":"will · 조건 약속","en":"Give me a call and I'll explain.","ko":"전화 줘, 그럼 내가 설명할게. (조건부 약속)"},{"g":"will 대조","tag":"will · 막연한 약속","en":"One day I'll pay you back.","ko":"언젠가 꼭 갚을게. (막연한 약속)"},{"g":"will 대조","tag":"will · 즉흥 결정","en":"Don't move, I'll take care of it.","ko":"가만있어, 내가 처리할게. (즉석 결정)"},{"g":"will 대조","tag":"will · 막연한 예측","en":"She'll probably be late again.","ko":"걔 또 늦을 것 같아. (막연한 추측)"},{"g":"will 대조","tag":"will · 즉흥 결정","en":"Okay, okay, I'll clean my room!","ko":"알았어 알았어, 방 치울게! (마지못한 즉석 결정)"},{"g":"will 대조","tag":"will · 예측","en":"Trust me, everything will change.","ko":"날 믿어, 다 바뀔 거야. (예측)"},{"g":"질문·부정","tag":"의문문","en":"Are you going to eat that?","ko":"그거 먹을 거야?"},{"g":"질문·부정","tag":"의문문","en":"When are you going to tell her?","ko":"언제 걔한테 말할 거야?"},{"g":"질문·부정","tag":"의문문","en":"What are we going to do now?","ko":"이제 우리 어떻게 하지?"},{"g":"질문·부정","tag":"부정문","en":"I'm not going to argue with you.","ko":"너랑 다투지 않을 거야."},{"g":"질문·부정","tag":"부정문","en":"She's not going to like this.","ko":"걔 이거 안 좋아할 거야."},{"g":"질문·부정","tag":"의문문","en":"How are you going to explain that?","ko":"그걸 어떻게 설명할 건데?"},{"g":"질문·부정","tag":"의문문","en":"Why are you going to quit?","ko":"왜 그만두려는 거야?"},{"g":"질문·부정","tag":"의문문","en":"Aren't you going to say anything?","ko":"아무 말도 안 할 거야?"},{"g":"질문·부정","tag":"부정문","en":"We're not going to make it in time.","ko":"우리 제시간에 못 갈 거야."},{"g":"질문·부정","tag":"의문문","en":"Who's going to pay for all this?","ko":"이거 다 누가 낼 거야?"},{"g":"질문·부정","tag":"부정문","en":"I'm not going to let that happen.","ko":"그런 일이 일어나게 두지 않을 거야."},{"g":"질문·부정","tag":"의문문","en":"Where are you going to stay?","ko":"어디서 지낼 거야?"},{"g":"질문·부정","tag":"의문문","en":"Are they going to be okay?","ko":"걔네 괜찮을까?"},{"g":"질문·부정","tag":"부정문","en":"You're not going to believe what happened.","ko":"무슨 일이 있었는지 넌 못 믿을 거야."},{"g":"질문·부정","tag":"의문문","en":"Is this going to hurt?","ko":"이거 아플까요?"}]},{"id":"proverb","name":"Lesson 3 · 속담·격언 100","gl":"주제","groups":["노력·성공","지혜·신중","시간·기회","인간관계","인생·태도"],"bold":"none","choiceBy":"en","data":[{"g":"노력·성공","tag":"노력·성공","en":"Practice makes perfect.","ko":"연습이 완벽을 만든다."},{"g":"노력·성공","tag":"노력·성공","en":"No pain, no gain.","ko":"고통 없이는 얻는 것도 없다."},{"g":"노력·성공","tag":"노력·성공","en":"Rome wasn't built in a day.","ko":"로마는 하루아침에 이루어지지 않았다."},{"g":"노력·성공","tag":"노력·성공","en":"Where there's a will, there's a way.","ko":"뜻이 있는 곳에 길이 있다."},{"g":"노력·성공","tag":"노력·성공","en":"Slow and steady wins the race.","ko":"느려도 꾸준한 것이 이긴다."},{"g":"노력·성공","tag":"노력·성공","en":"Nothing ventured, nothing gained.","ko":"모험하지 않으면 얻는 것도 없다."},{"g":"노력·성공","tag":"노력·성공","en":"Fortune favors the bold.","ko":"행운은 용감한 자의 편이다."},{"g":"노력·성공","tag":"노력·성공","en":"If at first you don't succeed, try, try again.","ko":"처음에 실패해도 계속 도전하라."},{"g":"노력·성공","tag":"노력·성공","en":"The early bird catches the worm.","ko":"일찍 일어나는 새가 벌레를 잡는다."},{"g":"노력·성공","tag":"노력·성공","en":"Practice what you preach.","ko":"말한 대로 실천하라."},{"g":"노력·성공","tag":"노력·성공","en":"Actions speak louder than words.","ko":"말보다 행동이 중요하다."},{"g":"노력·성공","tag":"노력·성공","en":"Well begun is half done.","ko":"시작이 반이다."},{"g":"노력·성공","tag":"노력·성공","en":"A journey of a thousand miles begins with a single step.","ko":"천 리 길도 한 걸음부터."},{"g":"노력·성공","tag":"노력·성공","en":"You reap what you sow.","ko":"뿌린 대로 거둔다."},{"g":"노력·성공","tag":"노력·성공","en":"When the going gets tough, the tough get going.","ko":"힘들수록 강한 자가 나선다."},{"g":"노력·성공","tag":"노력·성공","en":"If it's worth doing, it's worth doing well.","ko":"할 가치가 있으면 제대로 해라."},{"g":"노력·성공","tag":"노력·성공","en":"Failure is the mother of success.","ko":"실패는 성공의 어머니."},{"g":"노력·성공","tag":"노력·성공","en":"Necessity is the mother of invention.","ko":"필요는 발명의 어머니."},{"g":"노력·성공","tag":"노력·성공","en":"Knowledge is power.","ko":"아는 것이 힘이다."},{"g":"노력·성공","tag":"노력·성공","en":"Third time's the charm.","ko":"세 번째엔 잘 된다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Look before you leap.","ko":"돌다리도 두들겨 보고 건너라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Better safe than sorry.","ko":"나중에 후회하느니 조심하는 게 낫다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Don't count your chickens before they hatch.","ko":"김칫국부터 마시지 마라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Don't put all your eggs in one basket.","ko":"한 바구니에 모든 달걀을 담지 마라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Don't judge a book by its cover.","ko":"겉만 보고 판단하지 마라."},{"g":"지혜·신중","tag":"지혜·신중","en":"All that glitters is not gold.","ko":"번쩍인다고 다 금은 아니다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Curiosity killed the cat.","ko":"지나친 호기심은 화를 부른다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Let sleeping dogs lie.","ko":"긁어 부스럼 만들지 마라."},{"g":"지혜·신중","tag":"지혜·신중","en":"If it ain't broke, don't fix it.","ko":"멀쩡한 걸 괜히 건드리지 마라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Haste makes waste.","ko":"급할수록 돌아가라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Prevention is better than cure.","ko":"예방이 치료보다 낫다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Measure twice, cut once.","ko":"두 번 재고 한 번 잘라라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Once bitten, twice shy.","ko":"한 번 데면 조심하게 된다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Barking dogs seldom bite.","ko":"짖는 개는 물지 않는다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Still waters run deep.","ko":"잔잔한 물이 깊다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Silence is golden.","ko":"침묵은 금이다."},{"g":"지혜·신중","tag":"지혜·신중","en":"A word to the wise is enough.","ko":"지혜로운 이에겐 한마디면 족하다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Discretion is the better part of valor.","ko":"신중함이 용기의 절반이다."},{"g":"지혜·신중","tag":"지혜·신중","en":"Don't bite off more than you can chew.","ko":"분수에 맞게 행동하라."},{"g":"지혜·신중","tag":"지혜·신중","en":"Cross that bridge when you come to it.","ko":"닥쳐서 걱정해라."},{"g":"시간·기회","tag":"시간·기회","en":"Better late than never.","ko":"늦더라도 안 하는 것보다 낫다."},{"g":"시간·기회","tag":"시간·기회","en":"Time is money.","ko":"시간은 돈이다."},{"g":"시간·기회","tag":"시간·기회","en":"Time heals all wounds.","ko":"시간이 약이다."},{"g":"시간·기회","tag":"시간·기회","en":"Make hay while the sun shines.","ko":"기회가 있을 때 잡아라."},{"g":"시간·기회","tag":"시간·기회","en":"Strike while the iron is hot.","ko":"쇠뿔도 단김에 빼라."},{"g":"시간·기회","tag":"시간·기회","en":"There's no time like the present.","ko":"지금이 바로 그때다."},{"g":"시간·기회","tag":"시간·기회","en":"Don't put off until tomorrow what you can do today.","ko":"오늘 할 일을 내일로 미루지 마라."},{"g":"시간·기회","tag":"시간·기회","en":"Opportunity knocks but once.","ko":"기회는 한 번만 온다."},{"g":"시간·기회","tag":"시간·기회","en":"Good things come to those who wait.","ko":"기다리는 자에게 복이 온다."},{"g":"시간·기회","tag":"시간·기회","en":"A watched pot never boils.","ko":"기다리는 시간은 더디 간다."},{"g":"시간·기회","tag":"시 ,"ko":"제 허물은 모르고 남 탓만 한다."},{"g":"인간관계","tag":"인간관계","en":"Do unto others as you would have them do unto you.","ko":"남에게 대접받고 싶은 대로 남을 대하라."},{"g":"인간관계","tag":"인간관계","en":"Honesty is the best policy.","ko":"정직이 최선의 방책이다."},{"g":"인간관계","tag":"인간관계","en":"A chain is only as strong as its weakest link.","ko":"사슬은 가장 약한 고리만큼만 강하다."},{"g":"인간관계","tag":"인간관계","en":"United we stand, divided we fall.","ko":"뭉치면 살고 흩어지면 죽는다."},{"g":"인간관계","tag":"인간관계","en":"Give someone an inch and they'll take a mile.","ko":"하나를 주면 열을 바란다."},{"g":"인간관계","tag":"인간관계","en":"When in Rome, do as the Romans do.","ko":"로마에 가면 로마법을 따르라."},{"g":"인생·태도","tag":"인생·태도","en":"Every cloud has a silver lining.","ko":"아무리 나쁜 일에도 좋은 면이 있다."},{"g":"인생·태도","tag":"인생·태도","en":"The grass is always greener on the other side.","ko":"남의 떡이 커 보인다."},{"g":"인생·태도","tag":"인생·태도","en":"Laughter is the best medicine.","ko":"웃음이 최고의 명약이다."},{"g":"인생·태도","tag":"인생·태도","en":"Don't cry over spilled milk.","ko":"이미 엎질러진 물이다."},{"g":"인생·태도","tag":"인생·태도","en":"Easy come, easy go.","ko":"쉽게 얻은 것은 쉽게 나간다."},{"g":"인생·태도","tag":"인생·태도","en":"What goes around comes around.","ko":"뿌린 대로 거둔다."},{"g":"인생·태도","tag":"인생·태도","en":"Ignorance is bliss.","ko":"모르는 게 약이다."},{"g":"인생·태도","tag":"인생·태도","en":"The best things in life are free.","ko":"인생에서 가장 좋은 것은 공짜다."},{"g":"인생·태도","tag":"인생·태도","en":"There's no such thing as a free lunch.","ko":"세상에 공짜는 없다."},{"g":"인생·태도","tag":"인생·태도","en":"Variety is the spice of life.","ko":"다양함이 인생의 묘미다."},{"g":"인생·태도","tag":"인생·태도","en":"Live and let live.","ko":"서로 참견 말고 살자."},{"g":"인생·태도","tag":"인생·태도","en":"Old habits die hard.","ko":"오랜 습관은 고치기 어렵다."},{"g":"인생·태도","tag":"인생·태도","en":"A leopard can't change its spots.","ko":"제 버릇 개 못 준다."},{"g":"인생·태도","tag":"인생·태도","en":"To err is human.","ko":"실수는 인간의 본성이다."},{"g":"인생·태도","tag":"인생·태도","en":"He who laughs last laughs best.","ko":"마지막에 웃는 자가 진짜 승자다."},{"g":"인생·태도","tag":"인생·태도","en":"Money doesn't grow on trees.","ko":"돈이 하늘에서 떨어지는 게 아니다."},{"g":"인생·태도","tag":"인생·태도","en":"There's no place like home.","ko":"집만 한 곳이 없다."},{"g":"인생·태도","tag":"인생·태도","en":"Beauty is only skin deep.","ko":"아름다움은 겉모습일 뿐이다."},{"g":"인생·태도","tag":"인생·태도","en":"Every man for himself.","ko":"각자도생."},{"g":"인생·태도","tag":"인생·태도","en":"When life gives you lemons, make lemonade.","ko":"시련이 와도 긍정적으로 이겨내라."}]},{"id":"business","name":"Lesson 4 · 비즈니스 스피치 100","gl":"단계","groups":["오프닝·인사","목적·순서","전환·연결","데이터·시각자료","강조·설득","Q&A·응대","마무리·감사"],"bold":"none","choiceBy":"en","data":[{"g":"오프닝·인사","tag":"오프닝·인사","en":"Good morning, everyone. Thank you for coming.","ko":"안녕하세요 여러분. 와 주셔서 감사합니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Thank you all for being here today.","ko":"오늘 이 자리에 와 주셔서 감사합니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Let me start by introducing myself.","ko":"먼저 제 소개부터 하겠습니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"For those who don't know me, I'm the project lead.","ko":"저를 모르시는 분들을 위해, 저는 프로젝트 리더입니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"It's a pleasure to be here with you today.","ko":"오늘 여러분과 함께하게 되어 기쁩니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"I appreciate you taking the time to join us.","ko":"시간 내어 참석해 주셔서 감사합니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Before we begin, let me quickly go over the agenda.","ko":"시작하기 전에, 오늘 순서를 간단히 짚어보겠습니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"I'll keep this brief and to the point.","ko":"간결하고 핵심만 말씀드리겠습니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Feel free to stop me if you have any questions.","ko":"질문 있으시면 언제든 말씀해 주세요."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Today, I'd like to talk about our new strategy.","ko":"오늘은 우리의 새 전략에 대해 말씀드리려 합니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Let's get started, shall we?","ko":"그럼 시작해 볼까요?"},{"g":"오프닝·인사","tag":"오프닝·인사","en":"I know your time is valuable, so let's dive in.","ko":"여러분의 시간이 소중하니, 바로 시작하겠습니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"On behalf of the team, welcome.","ko":"팀을 대표하여, 환영합니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"I'm excited to share our results with you.","ko":"우리 결과를 여러분과 나누게 되어 기쁩니다."},{"g":"오프닝·인사","tag":"오프닝·인사","en":"Let me set the stage for what we'll cover.","ko":"오늘 다룰 내용의 배경을 말씀드리겠습니다."},{"g":"목적·순서","tag":"목적·순서","en":"The purpose of today's presentation is to share our results.","ko":"오늘 발표의 목적은 우리 결과를 공유하는 것입니다."},{"g":"목적·순서","tag":"목적·순서","en":"My goal today is to walk you through our plan.","ko":"오늘 제 목표는 우리 계획을 하나씩 설명하는 것입니다."},{"g":"목적·순서","tag":"목적·순서","en":"I've divided my talk into three parts.","ko":"제 발표를 세 부분으로 나눴습니다."},{"g":"목적·순서","tag":"목적·순서","en":"First, I'll cover the background. Then, the results.","ko":"먼저 배경을, 그다음 결과를 다루겠습니다."},{"g":"목적·순서","tag":"목적·순서","en":"By the end, you'll have a clear picture of our plan.","ko":"끝나실 즈음엔 우리 계획을 명확히 이해하시게 될 겁니다."},{"g":"목적·순서","tag":"목적·순서","en":"Let me give you a quick overview.","ko":"간단한 개요를 말씀드리겠습니다."},{"g":"목적·순서","tag":"목적·순서","en":"There are three key points I want to make.","ko":"제가 강조하고 싶은 핵심은 세 가지입니다."},{"g":"목적·순서","tag":"목적·순서","en":"We'll have time for questions at the end.","ko":"질문은 마지막에 시간을 마련하겠습니다."},{"g":"목적·순서","tag":"목적·순서","en":"I'd like to focus on what matters most.","ko":"가장 중요한 것에 집중하고 싶습니다."},{"g":"목적·순서","tag":"목적·순서","en":"Let me outline where we're headed.","ko":"앞으로의 방향을 정리해 드리겠습니다."},{"g":"목적·순서","tag":"목적·순서","en":"This should take about twenty minutes.","ko":"대략 20분 정도 걸릴 예정입니다."},{"g":"목적·순서","tag":"목적·순서","en":"Let's begin with the big picture.","ko":"큰 그림부터 시작하겠습니다."},{"g":"목적·순서","tag":"목적·순서","en":"I want to leave you with three takeaways.","ko":"세 가지 핵심을 기억하고 가시길 바랍니다."},{"g":"목적·순서","tag":"목적·순서","en":"Here's what I'll be covering today.","ko":"오늘 다룰 내용은 다음과 같습니다."},{"g":"목적·순서","tag":"목적·순서","en":"Let me frame the problem first.","ko":"먼저 문제를 정리해 보겠습니다."},{"g":"전환·연결","tag":"전환·연결","en":"Now, let's move on to the next point.","ko":"이제 다음 내용으로 넘어가겠습니다."},{"g":"전환·연결","tag":"전환·연결","en":"That brings me to my next point.","ko":"그러면 다음 요점으로 이어집니다."},{"g":"전환·연결","tag":"전환·연결","en":"Let's take a closer look at :"What's this supposed to mean?","ko":"이게 무슨 뜻이야?"},{"g":"원래 목적","tag":"원래 목적","en":"This lever is supposed to open the door.","ko":"이 레버가 문을 여는 거야."},{"g":"원래 목적","tag":"원래 목적","en":"The update is supposed to fix the bug.","ko":"이 업데이트가 그 버그를 고치는 거야."},{"g":"원래 목적","tag":"원래 목적","en":"It's supposed to fold up like this.","ko":"이건 이렇게 접히게 되어 있어."},{"g":"원래 목적","tag":"원래 목적","en":"This vent is supposed to let out the heat.","ko":"이 통풍구가 열을 빼주는 거야."},{"g":"예상·추측","tag":"예상·추측","en":"It's supposed to rain tomorrow.","ko":"내일 비 온대."},{"g":"예상·추측","tag":"예상·추측","en":"It's supposed to be really cold this weekend.","ko":"이번 주말에 엄청 춥대."},{"g":"예상·추측","tag":"예상·추측","en":"Traffic is supposed to be light today.","ko":"오늘 차 안 막힌대."},{"g":"예상·추측","tag":"예상·추측","en":"The party is supposed to be huge.","ko":"파티 엄청 크게 열린대."},{"g":"예상·추측","tag":"예상·추측","en":"It's supposed to snow all night.","ko":"밤새 눈이 온대."},{"g":"예상·추측","tag":"예상·추측","en":"Prices are supposed to go up next year.","ko":"내년에 물가가 오른대."},{"g":"예상·추측","tag":"예상·추측","en":"The economy is supposed to recover soon.","ko":"경제가 곧 회복된대."},{"g":"예상·추측","tag":"예상·추측","en":"It's supposed to get better with time.","ko":"시간이 지나면 나아진대."},{"g":"예상·추측","tag":"예상·추측","en":"Tomorrow is supposed to be sunny.","ko":"내일 맑을 거래."},{"g":"예상·추측","tag":"예상·추측","en":"The concert is supposed to sell out fast.","ko":"콘서트 금방 매진된대."},{"g":"예상·추측","tag":"예상·추측","en":"This winter is supposed to be mild.","ko":"이번 겨울은 포근할 거래."},{"g":"역할·책임","tag":"역할·책임","en":"I'm supposed to handle the schedule.","ko":"일정 관리는 내 담당이야."},{"g":"역할·책임","tag":"역할·책임","en":"That's not my job; you're supposed to do it.","ko":"그건 내 일이 아냐, 네가 해야지."},{"g":"역할·책임","tag":"역할·책임","en":"Who's supposed to lock up tonight?","ko":"오늘 밤 문 잠그는 거 누구 담당이야?"},{"g":"역할·책임","tag":"역할·책임","en":"I'm supposed to look after my little brother.","ko":"난 동생을 돌봐야 해."},{"g":"역할·책임","tag":"역할·책임","en":"You're supposed to be in charge here.","ko":"여기 책임자는 너잖아."},{"g":"역할·책임","tag":"역할·책임","en":"She's supposed to review all the reports.","ko":"걔가 모든 보고서를 검토하게 되어 있어."},{"g":"역할·책임","tag":"역할·책임","en":"Am I supposed to do this by myself?","ko":"이걸 나 혼자 하라는 거야?"},{"g":"역할·책임","tag":"역할·책임","en":"We're supposed to split the work evenly.","ko":"우리 일을 똑같이 나누기로 되어 있어."},{"g":"역할·책임","tag":"역할·책임","en":"He's supposed to cover my shift.","ko":"걔가 내 근무를 대신하기로 되어 있어."},{"g":"역할·책임","tag":"역할·책임","en":"You're supposed to keep an eye on the kids.","ko":"네가 애들을 지켜보기로 했잖아."},{"g":"역할·책임","tag":"역할·책임","en":"I'm the one who's supposed to decide.","ko":"결정하는 건 나야."},{"g":"반문·항의","tag":"반문·항의","en":"How was I supposed to know?","ko":"내가 그걸 어떻게 알았겠어?"},{"g":"반문·항의","tag":"반문·항의","en":"What am I supposed to do now?","ko":"이제 나더러 어쩌라는 거야?"},{"g":"반문·항의","tag":"반문·항의","en":"What's that supposed to mean?","ko":"그게 무슨 소리야?"},{"g":"반문·항의","tag":"반문·항의","en":"Am I supposed to just sit here?","ko":"나더러 그냥 여기 앉아 있으라고?"},{"g":"반문·항의","tag":"반문·항의","en":"How am I supposed to finish this in time?","ko":"이걸 시간 안에 어떻게 끝내라는 거야?"},{"g":"반문·항의","tag":"반문·항의","en":"What were we supposed to say?","ko":"우리더러 뭐라고 하라는 거였어?"},{"g":"반문·항의","tag":"반문·항의","en":"Where am I supposed to go?","ko":"나더러 어디로 가라는 거야?"},{"g":"반문·항의","tag":"반문·항의","en":"How is that supposed to help?","ko":"그게 무슨 도움이 된다는 거야?"},{"g":"반문·항의","tag":"반문·항의","en":"Am I supposed to read your mind?","ko":"내가 네 속마음을 읽기라도 해야 해?"},{"g":"반문·항의","tag":"반문·항의","en":"What am I supposed to tell them?","ko":"걔네한테 뭐라고 말해야 해?"}]},{"id":"self","name":"Lesson 7 · 나에 대해 말하기 100","gl":"주제","groups":["기본 소개","성격·성향","취미·관심사","가족·배경","일·커리어","좋아하는 것","목표·미래","일상·루틴","감정·의견"],"bold":"none","choiceBy":"en","data":[{"g":"기본 소개","tag":"기본 소개","en":"Let me tell you a little about myself.","ko":"제 소개를 조금 할게요."},{"g":"기본 소개","tag":"기본 소개","en":"My name is Jimin, but you can call me Jim.","ko":"제 이름은 지민인데, 짐이라고 불러도 돼요."},{"g":"기본 소개","tag":"기본 소개","en":"I'm originally from Busan.","ko":"저는 원래 부산 출신이에요."},{"g":"기본 소개","tag":"기본 소개","en":"I was born and raised in Seoul.","ko":"저는 서울에서 나고 자랐어요."},{"g":"기본 소개","tag":"기본 소개","en":"I've lived here for about five years.","ko":"여기서 5년 정도 살았어요."},{"g":"기본 소개","tag":"기본 소개","en":"I'm in my late twenties.","ko":"저는 20대 후반이에요."},{"g":"기본 소개","tag":"기본 소개","en":"I work as a software engineer.","ko":"저는 소프트웨어 엔지니어로 일해요."},{"g":"기본 소개","tag":"기본 소개","en":"I'm currently a student.","ko":"저는 현재 학생이에요."},{"g":"기본 소개","tag":"기본 소개","en":"Nice to meet you, I've heard a lot about you.","ko":"만나서 반가워요, 얘기 많이 들었어요."},{"g":"기본 소개","tag":"기본 소개","en":"I speak Korean and a little English.","ko":"저는 한국어랑 영어를 조금 해요."},{"g":"기본 소개","tag":"기본 소개","en":"I moved here for work.","ko":"일 때문에 여기로 이사 왔어요."},{"g":"기본 소개","tag":"기본 소개","en":"A little about my background — I studied design.","ko":"제 배경을 조금 말하자면, 디자인을 전공했어요."},{"g":"성격·성향","tag":"성격·성향","en":"I'd describe myself as easygoing.","ko":"저는 제가 느긋한 편이라고 생각해요."},{"g":"성격·성향","tag":"성격·성향","en":"I'm a pretty outgoing person.","ko":"저는 꽤 외향적인 사람이에요."},{"g":"성격·성향","tag":"성격·성향","en":"I tend to be quiet at first.","ko":"저는 처음엔 조용한 편이에요."},{"g":"성격·성향","tag":"성격·성향","en":"People say I'm a good listener.","ko":"사람들이 제가 남의 말을 잘 들어준다고 해요."},{"g":"성격·성향","tag":"성격·성향","en":"I'm a bit of a perfectionist.","ko":"저는 완벽주의 성향이 좀 있어요."},{"g":"성격·성향","tag":"성격·성향","en":"I consider myself very organized.","ko":"저는 스스로 꽤 꼼꼼하다고 생각해요."},{"g":"성격·성향","tag":"성격·성향","en":"I'm more of an introvert.","ko":"저는 내향적인 편에 가까워요."},{"g":"성격·성향","tag":"성격·성향","en":"I get along with almost everyone.","ko":"저는 거의 모든 사람과 잘 지내요."},{"g":"성격·성향","tag":"성격·성향","en":"I try to stay positive.","ko":"저는 긍정적으로 지내려고 해요."},{"g":"성격·성향","tag":"성격·성향","en":"I'm not afraid to try new things.","ko":"저는 새로운 걸 시도하는 걸 두려워하지 않아요."},{"g":"성격·성향","tag":"성격·성향","en":"I can be a little stubborn sometimes.","ko":"저는 가끔 좀 고집이 세요."},{"g":"성격·성향","tag":"성격·성향","en":"I value honesty above all.","ko":"저는 무엇보다 정직을 중요하게 여겨요."},{"g":"성격·성향","tag":"성격·성향","en":"I'm the type who plans everything.","ko":"저는 뭐든 계획하는 타입이에요."} roommate downtown.","ko":"시내에서 룸메이트와 함께 살아요."},{"g":"일·커리어","tag":"일·커리어","en":"I've been in this field for ten years.","ko":"이 분야에서 10년 일했어요."},{"g":"일·커리어","tag":"일·커리어","en":"I'm passionate about what I do.","ko":"저는 제 일에 열정이 있어요."},{"g":"일·커리어","tag":"일·커리어","en":"My job involves a lot of teamwork.","ko":"제 일은 팀워크가 많이 필요해요."},{"g":"일·커리어","tag":"일·커리어","en":"I'm looking for new opportunities.","ko":"저는 새로운 기회를 찾고 있어요."},{"g":"일·커리어","tag":"일·커리어","en":"I recently got promoted.","ko":"최근에 승진했어요."},{"g":"일·커리어","tag":"일·커리어","en":"I work from home most days.","ko":"저는 대부분 재택근무를 해요."},{"g":"일·커리어","tag":"일·커리어","en":"I handle client relationships.","ko":"저는 고객 관리를 담당해요."},{"g":"일·커리어","tag":"일·커리어","en":"I'm still figuring out my career path.","ko":"저는 아직 진로를 찾는 중이에요."},{"g":"일·커리어","tag":"일·커리어","en":"I love the creative side of my work.","ko":"제 일의 창의적인 면이 좋아요."},{"g":"일·커리어","tag":"일·커리어","en":"I switched careers a few years ago.","ko":"몇 년 전에 직종을 바꿨어요."},{"g":"일·커리어","tag":"일·커리어","en":"I take pride in my work.","ko":"저는 제 일에 자부심을 느껴요."},{"g":"일·커리어","tag":"일·커리어","en":"My goal is to start my own company.","ko":"제 목표는 제 회사를 차리는 거예요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I'm a coffee person, not a tea person.","ko":"저는 차보다 커피를 좋아해요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I could eat pizza every day.","ko":"저는 매일 피자를 먹을 수도 있어요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I prefer quiet nights in.","ko":"저는 집에서 조용히 보내는 밤을 더 좋아해요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I'm not a big fan of crowds.","ko":"저는 사람 많은 곳을 별로 안 좋아해요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I love anything with chocolate.","ko":"저는 초콜릿 들어간 건 다 좋아해요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"Autumn is my favorite season.","ko":"가을이 제가 가장 좋아하는 계절이에요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I can't stand being late.","ko":"저는 늦는 걸 정말 싫어해요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I really enjoy meeting new people.","ko":"저는 새로운 사람 만나는 걸 정말 즐겨요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I'm obsessed with true crime podcasts.","ko":"저는 범죄 실화 팟캐스트에 빠져 있어요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I'd rather stay in than go out.","ko":"저는 나가느니 집에 있는 게 나아요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"I have a soft spot for old movies.","ko":"저는 옛날 영화를 좋아하는 마음이 있어요."},{"g":"좋아하는 것","tag":"좋아하는 것","en":"Nothing beats a good book on a rainy day.","ko":"비 오는 날 좋은 책만 한 게 없어요."},{"g":"목표·미래","tag":"목표·미래","en":"I want to travel the world someday.","ko":"언젠가 세계를 여행하고 싶어요."},{"g":"목표·미래","tag":"목표·미래","en":"I'm trying to learn a new language.","ko":"새로운 언어를 배우려고 하고 있어요."},{"g":"목표·미래","tag":"목표·미래","en":"My dream is to live abroad.","ko":"제 꿈은 외국에서 사는 거예요."},{"g":"목표·미래","tag":"목표·미래","en":"I hope to grow in my career.","ko":"커리어에서 성장하고 싶어요."},{"g":"목표·미래","tag":"목표·미래","en":"I'm working toward a healthier lifestyle.","ko":"더 건강한 생활을 향해 노력 중이에요."},{"g":"목표·미래","tag":"목표·미래","en":"I'd love to write a book one day.","ko":"언젠가 책을 쓰고 싶어요."},{"g":"목표·미래","tag":"목표·미래","en":"I'm saving up to buy a house.","ko":"집을 사려고 돈을 모으고 있어요."},{"g":"목표·미래","tag":"목표·미래","en":"I want to make a difference.","ko":"저는 변화를 만들고 싶어요."},{"g":"목표·미래","tag":"목표·미래","en":"In five years, I see myself running a team.","ko":"5년 후엔 팀을 이끄는 제 모습을 그려요."},{"g":"목표·미래","tag":"목표·미래","en":"I'm always looking to improve myself.","ko":"저는 늘 자기 발전을 추구해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I'm an early riser.","ko":"저는 아침형 인간이에요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I usually start my day with a run.","ko":"보통 달리기로 하루를 시작해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I'm not a morning person.","ko":"저는 아침형 인간이 아니에요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I like to keep my weekends free.","ko":"주말은 비워두는 걸 좋아해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I check my email first thing in the morning.","ko":"아침에 제일 먼저 이메일을 확인해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I try to read before bed.","ko":"자기 전에 책을 읽으려고 해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I meal prep on Sundays.","ko":"일요일에 일주일 치 음식을 준비해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"My routine keeps me grounded.","ko":"규칙적인 생활이 저를 안정되게 해요."},{"g":"일상·루틴","tag":"일상·루틴","en":"I take a walk after lunch every day.","ko":"매일 점심 후에 산책을 해요."},{"g":"감정·의견","tag":"감정·의견","en":"To be honest, I'm a little nervous.","ko":"솔직히 말하면, 조금 긴장돼요."},{"g":"감정·의견","tag":"감정·의견","en":"I feel strongly about this.","ko":"저는 이것에 대해 확고한 생각이 있어요."},{"g":"감정·의견","tag":"감정·의견","en":"If you ask me, it's worth it.","ko":"제 생각엔 그럴 만한 가치가 있어요."},{"g":"감정·의견","tag":"감정·의견","en":"I'm really excited about this.","ko":"저는 이것 때문에 정말 신나요."},{"g":"감정·의견","tag":"감정·의견","en":"That's just my personal opinion.","ko":"그건 그냥 제 개인적인 의견이에요."},{"g":"감정·의견","tag":"감정·의견","en":"I couldn't agree more.","ko":"전적으로 동의해요."},{"g":"감정·의견","tag":"감정·의견","en":"I see it a little differently.","ko":"저는 좀 다르게 봐요."},{"g":"감정·의견","tag":"감정·의견","en":"It means a lot to me.","ko":"그건 제게 큰 의미가 있어요."},{"g":"감정·의견","tag":"감정·의견","en":"I'm grateful for the chance to be here.","ko":"이 자리에 있게 되어 감사해요."}]},{"id":"polite","name":"Lesson 8 · 정중한 영어 패턴 100","gl":"상황","groups":["부탁·요청","허락 구하기","완곡한 문의","양해·사과","감사·제안"],"bold":"none","choiceBy":"tag","data":[{"g":"부탁·요청","tag":"Would you mind ~?","en":"Would you mind closing the window?","ko":"창문 좀 닫아 주시겠어요?"},{"g":"부탁·요청","tag":"Would you mind ~?","en":"Would you mind giving me a hand?","ko":"저 좀 도와주시겠어요?"},{"g":"부탁·요청","tag":"Would you mind ~?","en":"Would you mind repeating that?","ko":"다시 한 번 말씀해 주시겠어요?"},{"g":"부탁·요청","tag":"Would you mind ~?","en":"Would you mind waiting a few minutes?","ko":"몇 분만 기다려 주시겠어요?"},{"g":"부탁·요청","tag":"Would you mind ~?","en":"Would you mind turning down the music?","ko":"음악 소리 좀 줄여 주시겠어요?"},{"g":"부탁·요청","tag":"Could you possibly ~?","en":"Could you possibly help me move this?","ko":"혹시 이거 옮기는 것 좀 도와주실 수 있을까요?"},{"g":"부탁·요청","tag":"Could you possibly ~?","en":"Could you possibly send it by tonight?","ko":"혹시 오늘 밤까지 보내주실 수 있을까요?"},{"g":"부탁·요청","tag":"Could you possibly ~?","en":"Could you possibly lower the price a bit?","ko":"혹시 가격을 조금 낮춰 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Could you possibly ~?","en":"Could you possibly explain that again?","ko":"혹시 다시 설명해 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Could you possibly ~?","en":"Could you possibly give me a ride?","ko":"혹시 저 좀 태워 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Would you be able to ~?","en":"Would you be able to finish it by Friday?","ko":"금요일까지 끝내주실 수 있으세요?"},{"g":"부탁·요청","tag":"Would you be able to ~?","en":"Would you be able to join us tomorrow?","ko":"내일 저희와 함께하실 수 있으세요?"},{"g":"부탁·요청","tag":"Would you be able to ~?","en":"Would you be able to cover my shift?","ko":"제 근무 좀 대신해 주실 수 있으세요?"},{"g":"부탁·요청","tag":"Would you be able to ~?","en":"Would you be able to send me the file?","ko":"그 파일 좀 보내주실 수 있으세요?"},{"g":"부탁·요청","tag":"Would you be able to ~?","en":"Would you be able to meet a bit earlier?","ko":"조금 일찍 만나실 수 있으세요?"},{"g":"부탁·요청","tag":"Do you think you could ~?","en":"Do you think you could speak a little slower?","ko":"조금 천천히 말씀해 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Do you think you could ~?","en":"Do you think you could take a look at this?","ko":"이것 좀 봐 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Do you think you could ~?","en":"Do you think you could keep it down?","ko":"조금 조용히 해 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Do you think you could ~?","en":"Do you think you could save me a seat?","ko":"자리 하나 맡아 주실 수 있을까요?"},{"g":"부탁·요청","tag":"Do you think you could ~?","en":"Do you think you could double-check this?","ko":"이것 좀 다시 확인해 주실 수 있을까요?"},{"g":"부탁·요청","tag":"When you get a chance ~","en":"When you get a chance, could you call me back?","ko":"시간 되실 때 다시 전화해 주실래요?"},{"g":"부탁·요청","tag":"When you get a chance ~","en":"When you get a chance, could you review this?","ko":"시간 되실 때 이것 좀 검토해 주실래요?"},{"g":"부탁·요청","tag":"When you get a chance ~","en":"When you get a chance, could you reply to my email?","ko":"시간 되실 때 제 이메일에 답장해 주실래요?"},{"g":"부탁·요청","tag":"When you get a chance ~","en":"When you get a chance, could you sign this form?","ko":"시간 되실 때 이 서류에 서명해 주실래요?"},{"g":"부탁·요청","tag":"When you get a chance ~","en":"When you get a chance, could you water the plants?","ko":"시간 되실 때 화분에 물 좀 줄래요?"},{"g":"허락 구하기","tag":"Do you mind if I ~?","en":"Do you mind if I sit here?","ko":"여기 앉아도 될까요?"},{"g":"허락 구하기","tag":"Do you mind if I ~?","en":"Do you mind if I open the window?","ko":"창문 좀 열어도 될까요?"},{"g":"허락 구하기","tag":"Do you mind if I ~?","en":"Do you mind if I join you?","ko":"저도 껴도 될까요?"},{"g":"허락 구하기","tag":"Do you mind if I ~?","en":"Do you mind if I take this chair?","ko":"이 의자 가져가도 될까요?"},{"g":"허락 구하기","tag":"Do you mind if I ~?","en":"Do you mind if I ask you something?","ko":"뭐 하나 물어봐도 될까요?"},{"g":"허락 구하기","tag":"Do you mind if I ~?","en":"Do you mind if I record this?","ko":"이거 녹음해도 될까요?"},{"g":"허락 구하기","tag":"Is it okay if I ~?","en":"Is it okay if I leave a little early?","ko":"조금 일찍 나가도 괜찮을까요?"},{"g":"허락 구하기","tag":"Is it okay if I ~?","en":"Is it okay if I bring a friend?","ko":"친구 한 명 데려와도 괜찮을까요?"},{"g":"허락 구하기","tag":"Is it okay if I ~?","en":"Is it okay if I pay by card?","ko":"카드로 결제해도 괜찮을까요?"},{"g":"허락 구하기","tag":"Is it okay if I ~?","en":"Is it okay if I call you tonight?","ko":"오늘 밤에 전화해도 괜찮을까요?"},{"g":"허락 구하기","tag":"Is it okay if I ~?","en":"Is it okay if I use your bathroom?","ko":"화장실 좀 써도 괜찮을까요?"},{"g":"허락 구하기","tag":"Is it okay if I ~?","en":"Is it okay if I take a quick break?","ko":"잠깐 쉬어도 괜찮을까요?"},{"g":"허락 구하기","tag":"If you don't mind ~","en":"If you don't mind, I'd like to sit by the window.","ko":"괜찮으시다면, 창가에 앉고 싶어요."},{"g":"허락 구하기","tag":"If you don't mind ~","en":"If you don't mind me asking, how old are you?","ko":"실례가 안 된다면, 나이가 어떻게 되세요?"},{"g":"허락 구하기","tag":"If you don't mind ~","en":"If you don't mind, could we start now?","ko":"괜찮으시다면, 지금 시작할까요?"},{"g":"허락 구하기","tag":"If you don't mind ~","en":"If you don't mind waiting, I'll be quick.","ko":"기다려 주시면, 금방 하겠습니다."},{"g":"허락 구하기","tag":"If you don't mind ~","en":"If you don't mind, I'll take a look first.","ko":"괜찮으시다면, 먼저 살펴볼게요."},{"g":"허락 구하기","tag":"If you don't mind ~","en":"If you don't mind, let's reschedule.","ko":"괜찮으시다면, 일정을 다시 잡아요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if you could help me.","ko":"혹시 저를 도와주실 수 있을까 해서요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if you had a moment.","ko":"잠깐 시간 있으신지 해서요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if this seat is taken.","ko":"이 자리 임자 있는지 궁금해서요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if we could talk.","ko":"혹시 얘기 좀 할 수 있을까 해서요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if you'd be interested.","ko":"혹시 관심 있으실까 해서요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if the deadline could be extended.","ko":"마감을 좀 미룰 수 있을까 해서요."},{"g":"완곡한 문의","tag":"I was wondering if ~","en":"I was wondering if you could recommend a place.","ko":"혹시 괜찮은 곳 추천해 주실 수 있을까 해서요."},{"g":"완곡한 문의","tag":"Would it be possible to ~?","en":"Would it be possible to change my order?","ko":"주문을 바꾸는 게 가능할까요?"},{"g":"완곡한 문의","tag":"Would it be possible to ~?","en":"Would it be possible to get a refund?","ko":"환불이 가능할까요?"},{"g":"완곡한 문의","tag":"Would it be possible to ~?","en":"Would it be possible to meet next week?","ko":"다음 주에 만나는 게 가능할까요?"},{"g":"완곡한 문의","tag":"Would it be possible to ~?","en":"Would it be possible to speak with the manager?","ko":"매니저와 얘기하는 게 가능할까요?"},{"g":"완곡한 문의","tag":"Would it be possible to ~?","en":"Would it be possible to get an extension?","ko":"기한 연장이 가능할까요?"},{"g":"완곡한 문의","tag":"Would it be possible to ~?","en":"Would it be possible to sit somewhere quieter?","ko":"좀 더 조용한 곳에 앉는 게 가능할까요?"},{"g":"완곡한 문의","tag":"Just to make sure ~","en":"Just to make sure, we're meeting at noon, right?","ko":"혹시나 해서요, 우리 정오에 만나는 거 맞죠?"},{"g":"완곡한 문의","tag":"Just to make sure ~","en":"Just to make sure, is this the right address?","ko":"확인차 여쭤요, 이 주소 맞나요?"},{"g":"완곡한 문의","tag":"Just to make sure ~","en":"Just to make sure, did you get my message?","ko":"혹시나 해서요, 제 메시지 받으셨어요?"},{"g":"완곡한 문의","tag":"Just to make sure ~","en":"Just to make sure, this is included, right?","ko":"확인차요, 이거 포함된 거 맞죠?"},{"g":"완곡한 문의","tag":"Just to make sure ~","en":"Just to make sure, you're okay with this?","ko":"혹시나 해서요, 이거 괜찮으신 거죠?"},{"g":"양해·사과","tag":"Sorry to bother you ~","en":"Sorry to bother you, but do you have a minute?","ko":"귀찮게 해서 죄송한데, 잠깐 시간 있으세요?"},{"g":"양해·사과","tag":"Sorry to bother you ~","en":"Sorry to bother you, but could you help me?","ko":"귀찮게 해서 죄송한데, 좀 도와주실래요?"},{"g":"양해·사과","tag":"Sorry to bother you ~","en":"Sorry to bother you, but is this seat free?","ko":"귀찮게 해서 죄송한데, 이 자리 비었나요?"},{"g":"양해·사과","tag":"Sorry to bother you ~","en":"Sorry to bother you, but I have a quick question.","ko":"귀찮게 해서 죄송한데, 간단한 질문이 있어요."},{"g":"양해·사과","tag":"Sorry to bother you ~","en":"Sorry to bother you, but the Wi-Fi isn't working.","ko":"귀찮게 해서 죄송한데, 와이파이가 안 돼요."},{"g":"양해·사과","tag":"Sorry to bother you ~","en":"Sorry to bother you, but could I get the check?","ko":"귀찮게 해서 죄송한데, 계산서 좀 주시겠어요?"},{"g":"양해·사과","tag":"I hate to ask ~","en":"I hate to ask, but could I borrow some money?","ko":"부탁하기 뭐하지만, 돈 좀 빌릴 수 있을까요?"},{"g":"양해·사과","tag":"I hate to ask ~","en":"I hate to ask, but can you cover for me?","ko":"부탁하기 뭐하지만, 저 대신 좀 해 주실래요?"},{"g":"양해·사과","tag":"I hate to ask ~","en":"I hate to ask, but could we push it to Monday?","ko":"부탁하기 뭐하지만, 월요일로 미룰 수 있을까요?"},{"g":"양해·사과","tag":"I hate to ask ~","en":"I hate to ask, but is there any way to speed this up?","ko":"부탁하기 뭐하지만, 좀 더 빨리 될 방법이 있을까요?"},{"g":"양해·사과","tag":"I hate to ask ~","en":"I hate to ask, but could you keep this between us?","ko":"부탁하기 뭐하지만, 이건 우리끼리만 알면 안 될까요?"},{"g":"양해·사과","tag":"I hate to ask ~","en":"I hate to ask, but do you have change for a twenty?","ko":"부탁하기 뭐하지만, 20달러 잔돈 있으세요?"},{"g":"양해·사과","tag":"No worries if not ~","en":"No worries if not, but could you help this weekend?","ko":"안 되면 괜찮은데, 이번 주말에 도와주실 수 있어요?"},{"g":"양해·사과","tag":"No worries if not ~","en":"No worries if not, but do you have any openings?","ko":"안 되면 괜찮은데, 혹시 자리 있나요?"},{"g":"양해·사과","tag":"No worries if not ~","en":"No worries if not, but could I get a discount?","ko":"안 되면 괜찮은데, 할인 가능할까요?"},{"g":"양해·사과","tag":"No worries if not ~","en":"No worries if not, but would you like to join?","ko":"안 되면 괜찮은데, 같이 하실래요?"},{"g":"양해·사과","tag":"No worries if not ~","en":"No worries if not, but can I stop by later?","ko":"안 되면 괜찮은데, 이따 잠깐 들러도 될까요?"},{"g":"양해·사과","tag":"No worries if not ~","en":"No worries if not, but could you send it today?","ko":"안 되면 괜찮은데, 오늘 보내주실 수 있어요?"},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd appreciate it if you could let me know soon.","ko":"곧 알려주시면 감사하겠습니다."},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd appreciate it if you kept this confidential.","ko":"이걸 비밀로 해 주시면 감사하겠습니다."},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd appreciate it if you could review my work.","ko":"제 작업을 검토해 주시면 감사하겠습니다."},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd appreciate it if we could start on time.","ko":"제시간에 시작해 주시면 감사하겠습니다."},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd appreciate it if you could double-check the numbers.","ko":"숫자를 다시 확인해 주시면 감사하겠습니다."},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd appreciate it if you could give me some feedback.","ko":"피드백을 주시면 감사하겠습니다."},{"g":"감사·제안","tag":"I'd appreciate it if ~","en":"I'd really appreciate your help with this.","ko":"이 일에 도움 주시면 정말 감사하겠습니다."},{"g":"감사·제안","tag":"Might I suggest ~?","en":"Might I suggest a different approach?","ko":"다른 방법을 제안해도 될까요?"},{"g":"감사·제안","tag":"Might I suggest ~?","en":"Might I suggest we take a short break?","ko":"잠깐 쉬는 걸 제안해도 될까요?"},{"g":"감사·제안","tag":"Might I suggest ~?","en":"Might I suggest starting with the basics?","ko":"기본부터 시작하는 걸 제안해도 될까요?"},{"g":"감사·제안","tag":"Might I suggest ~?","en":"Might I make a small suggestion?","ko":"작은 제안 하나 해도 될까요?"},{"g":"감사·제안","tag":"Might I suggest ~?","en":"Might I suggest we revisit this later?","ko":"이건 나중에 다시 보는 게 어떨까요?"},{"g":"감사·제안","tag":"Would you like me to ~?","en":"Would you like me to help you with that?","ko":"그거 도와드릴까요?"},{"g":"감사·제안","tag":"Would you like me to ~?","en":"Would you like me to explain it again?","ko":"다시 설명해 드릴까요?"},{"g":"감사·제안","tag":"Would you like me to ~?","en":"Would you like me to send you the details?","ko":"자세한 내용 보내드릴까요?"},{"g":"감사·제안","tag":"Would you like me to ~?","en":"Would you like me to wait for you?","ko":"기다려 드릴까요?"},{"g":"감사·제안","tag":"Would you like me to ~?","en":"Would you like me to book it for you?","ko":"제가 예약해 드릴까요?"},{"g":"감사·제안","tag":"Feel free to ~","en":"Feel free to ask if you have questions.","ko":"궁금한 거 있으면 편하게 물어보세요."},{"g":"감사·제안","tag":"Feel free to ~","en":"Feel free to reach out anytime.","ko":"언제든 편하게 연락 주세요."},{"g":"감사·제안","tag":"Feel free to ~","en":"Feel free to take your time.","ko":"천천히 하셔도 돼요."},{"g":"감사·제안","tag":"Feel free to ~","en":"Feel free to help yourself to some coffee.","ko":"커피 편하게 드세요."}]},{"id":"conditional","name":"Lesson 9 · if 가정법 100","gl":"유형","groups":["가정법 현재 · 특정 상황","가정법 과거 · 현재 반대","가정법 과거 · 예의 요청","혼합 가정법","가정법 과거완료 · 과거 반대"],"bold":"cond","choiceBy":"tag","data":[{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you call me later, I'll explain everything.","ko":"나중에 전화하면 다 설명해 줄게."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If it rains tomorrow, we'll stay home.","ko":"내일 비가 오면 우리 집에 있을 거야."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you finish early, you can go home.","ko":"일찍 끝나면 집에 가도 돼."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If she asks, just tell her the truth.","ko":"그녀가 물어보면 그냥 사실대로 말해."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If I have time this weekend, I'll visit you.","ko":"이번 주말에 시간 있으면 너한테 갈게."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you don't hurry, you'll miss the train.","ko":"서두르지 않으면 기차를 놓칠 거야."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If he doesn't answer, leave a message.","ko":"그가 안 받으면 메시지를 남겨."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If we leave now, we'll get there on time.","ko":"지금 출발하면 제시간에 도착할 거야."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you need anything, just let me know.","ko":"필요한 거 있으면 그냥 말해."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If the meeting runs late, I'll text you.","ko":"회의가 늦어지면 문자할게."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you press this button, the door opens.","ko":"이 버튼을 누르면 문이 열려."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you're tired, you should get some rest.","ko":"피곤하면 좀 쉬는 게 좋아."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If it's too expensive, we won't buy it.","ko":"너무 비싸면 우리 안 살 거야."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If they win tonight, everyone will celebrate.","ko":"오늘 밤 그들이 이기면 다들 축하할 거야."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you study hard, you'll pass the exam.","ko":"열심히 공부하면 시험에 합격할 거야."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If I'm not home, the key is under the mat.","ko":"내가 집에 없으면 열쇠는 매트 밑에 있어."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you see John, tell him I said hi.","ko":"존 보면 내가 안부 전한다고 해."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If the food is cold, I can heat it up.","ko":"음식이 식었으면 데워 줄 수 있어."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If you change your mind, give me a call.","ko":"마음이 바뀌면 나한테 전화해."},{"g":"가정법 현재 · 특정 상황","tag":"가정법 현재 · 특정 상황","en":"If we don't decide now, we'll lose the chance.","ko":"지금 결정 안 하면 기회를 놓칠 거야."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I had more money, I'd travel the world.","ko":"돈이 더 있다면 세계 여행을 할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I were you, I wouldn't do that.","ko":"내가 너라면 그렇게 안 할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If she knew the truth, she'd be upset.","ko":"그녀가 진실을 안다면 화낼 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If we lived closer, we'd see each other more.","ko":"우리가 더 가까이 산다면 더 자주 볼 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I had a car, I'd give you a ride.","ko":"차가 있다면 태워다 줄 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If he spoke English, he'd get the job.","ko":"그가 영어를 한다면 그 일자리를 얻을 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I weren't so busy, I'd help you.","ko":"내가 이렇게 바쁘지 않다면 도와줄 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If you exercised more, you'd feel better.","ko":"운동을 더 하면 몸이 더 좋아질 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If they trusted us, this would be easier.","ko":"그들이 우릴 믿는다면 이게 더 쉬울 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I knew her number, I'd call her.","ko":"그녀 번호를 안다면 전화할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If it weren't raining, we'd go for a walk.","ko":"비가 안 온다면 산책 갈 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I spoke Spanish, I'd move to Madrid.","ko":"내가 스페인어를 한다면 마드리드로 이사할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If we had more time, we'd do it properly.","ko":"시간이 더 있다면 제대로 할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If he were here, he'd know what to do.","ko":"그가 여기 있다면 어떻게 할지 알 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I didn't have to work, I'd sleep all day.","ko":"일 안 해도 된다면 하루 종일 잘 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If you asked nicely, she might say yes.","ko":"네가 정중하게 물으면 그녀가 예스할지도 몰라."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If money weren't an issue, I'd quit today.","ko":"돈이 문제가 아니라면 오늘 그만둘 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I were taller, I'd play basketball.","ko":"내가 키가 크다면 농구를 할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If we started a business, it would be risky.","ko":"우리가 사업을 시작한다면 위험할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If she loved him, she'd stay.","ko":"그녀가 그를 사랑한다면 남아 있을 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I could fly, I'd never take a plane.","ko":"날 수 있다면 비행기를 절대 안 탈 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If you were in my shoes, you'd understand.","ko":"네가 내 입장이라면 이해할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If the weather were nicer, we'd eat outside.","ko":"날씨가 더 좋다면 밖에서 먹을 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I had his talent, I'd be famous.","ko":"내가 그의 재능이 있다면 유명해질 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If they paid more, I'd stay at this company.","ko":"돈을 더 준다면 이 회사에 남을 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I weren't afraid, I'd tell her how I feel.","ko":"겁나지 않다면 그녀에게 내 마음을 말할 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If we had a bigger house, we'd get a dog.","ko":"집이 더 크다면 강아지를 키울 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If I understood the problem, I'd fix it.","ko":"문제를 이해한다면 고칠 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If you listened to me, you wouldn't be lost.","ko":"내 말을 들었다면 길을 잃지 않을 텐데."},{"g":"가정법 과거 · 현재 반대","tag":"가정법 과거 · 현재 반대","en":"If she had a choice, she'd leave right now.","ko":"선택권이 있다면 그녀는 지금 당장 떠날 텐데."},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Would you mind closing the window?","ko":"창문 좀 닫아 주시겠어요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Could you help me with this for a moment?","ko":"잠깐 이것 좀 도와주시겠어요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"I'd appreciate it if you could reply soon.","ko":"곧 답장해 주시면 감사하겠습니다."},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Would it be possible to move the meeting?","ko":"회의를 옮기는 게 가능할까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Could I ask you a quick question?","ko":"간단한 질문 하나 드려도 될까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Would you be able to send me the file?","ko":"그 파일을 보내 주실 수 있으실까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"I was wondering if you could give me a hand.","ko":"혹시 좀 도와주실 수 있을까 해서요."},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Would you mind if I opened the door?","ko":"제가 문을 열어도 괜찮을까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Could you possibly lower the price a little?","ko":"가격을 조금 낮춰 주실 수 있을까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"It would be great if you could join us.","ko":"함께해 주시면 정말 좋을 것 같아요."},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Would you like me to explain it again?","ko":"다시 설명해 드릴까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Could we perhaps continue this tomorrow?","ko":"혹시 이걸 내일 이어서 할 수 있을까요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"I'd be grateful if you kept this private.","ko":"이걸 비밀로 해 주시면 감사하겠습니다."},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Would you happen to know the way there?","ko":"혹시 거기 가는 길을 아세요?"},{"g":"가정법 과거 · 예의 요청","tag":"가정법 과거 · 예의 요청","en":"Could you let me know when you're free?","ko":"언제 시간 되는지 알려 주시겠어요?"},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If I had studied medicine, I'd be a doctor now.","ko":"의대를 갔다면 지금 의사일 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If she hadn't quit, she'd be the manager today.","ko":"그녀가 그만두지 않았다면 지금 매니저일 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If we had saved money, we wouldn't be broke now.","ko":"돈을 모았다면 지금 빈털터리는 아닐 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If he had listened, he wouldn't be in trouble now.","ko":"그가 말을 들었다면 지금 곤경에 처하지 않을 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If I hadn't missed the flight, I'd be home by now.","ko":"비행기를 안 놓쳤다면 지금쯤 집에 있을 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If they had trained harder, they'd be champions now.","ko":"더 열심히 훈련했다면 지금 챔피언일 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If I had taken that job, I'd be richer today.","ko":"그 일을 맡았다면 지금 더 부자일 텐데."},{"g":"혼합 가정법","tag":"혼합 가정법","en":"If you had slept, you wouldn't be so tired now.","ko":"잤다면 지금
